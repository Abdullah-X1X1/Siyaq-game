<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة سياق</title>
    
    <!-- تشغيل مكتبة Tailwind للألوان والتصاميم -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- استدعاء مكتبات React و Firebase المباشرة للمتصفح -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
      }
    </script>
</head>
<body class="bg-slate-900 text-white m-0 p-0 min-h-screen font-sans select-none">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set, onValue, get } from "firebase/database";

        // تكوين Firebase المستخرج من ملفك الأساسي
        const firebaseConfig = {
            authDomain: "siyaq-routine.firebaseapp.com",
            databaseURL: "https://siyaq-routine-default-rtdb.firebaseio.com",
            projectId: "siyaq-routine",
            storageBucket: "siyaq-routine.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:123"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const { useState, useEffect, useRef } = React;

        // الألوان الافتراضية للفرق
        const TEAM_COLORS = ['#5B7C99', '#8A6FAE', '#6F9C76', '#C08552', '#A3729C', '#5FA3A3', '#B0A062', '#9C6F6F'];

        // مصفوفة الأسئلة
        const QUESTIONS = [
            { category: 'عادات يومية', text: 'أول شيء يفعله أغلب الناس بعد الاستيقاظ من النوم', answers: [ { text: 'النظر في الجوال', points: 35 }, { text: 'شرب الماء', points: 20 }, { text: 'غسل الوجه', points: 15 }, { text: 'الذهاب للحمام', points: 12 }, { text: 'ترتيب السرير', points: 5 } ] },
            { category: 'تقنية وتسوق', text: 'أشياء يشتريها الناس عادة عبر الإنترنت بسبب العروض', answers: [ { text: 'ملابس وأحذية', points: 25 }, { text: 'ساعات ذكية', points: 15 }, { text: 'ألعاب فيديو', points: 10 }, { text: 'إكسسوارات سيارات', points: 5 }, { text: 'أكواب قهوة', points: 4 } ] },
            { category: 'طبخ', text: 'مكونات أساسية لا تخلو منها أي طبخة سعودية', answers: [ { text: 'بصل والطماطم / الصلصة', points: 20 }, { text: 'البهارات المشكلة', points: 15 }, { text: 'الزيت أو السمن', points: 10 }, { text: 'الثوم', points: 6 }, { text: 'الملح', points: 5 } ] }
        ];

        // توليد رمز غرفة عشوائي
        function generateRoomCode() {
            const chars = 'ABCDEFGHIJKLMNPQRSTUVWXYZ';
            let result = '';
            for (let i = 0; i < 4; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // الحالة الافتراضية للغرفة الجديدة
        function defaultState(roomCode) {
            return {
                roomCode,
                phase: 'lobby',
                round: 1,
                maxRounds: 3,
                teams: TEAM_COLORS.map((color, i) => ({ id: i, name: `فريق ${i + 1}`, color, score: 0 })),
                players: [],
                currentQuestionIdx: 0,
                errors: 0,
                errorFlashAt: 0,
                timer: { running: false, startedAt: null, duration: 30, updatedAt: Date.now() }
            };
        }

        function App() {
            const [roomCode, setRoomCode] = useState('');
            const [role, setRole] = useState(null); // 'host' or 'player'
            const [game, setGame] = useState(null);
            const [myPlayer, setMyPlayer] = useState(null);
            const [tick, setTick] = useState(0);
            const [errorMsg, setErrorMsg] = useState('');
            const [busy, setBusy] = useState(false);
            const [name, setName] = useState('');
            const [selectedTeam, setSelectedTeam] = useState(null);

            const gameRef = useRef(null);
            gameRef.current = game;

            // تحديث التوقيت اللحظي كل ثانية
            useEffect(() => {
                const interval = setInterval(() => setTick(t => t + 1), 1000);
                return () => clearInterval(interval);
            }, []);

            // الاتصال بـ Firebase عند الدخول للغرفة
            useEffect(() => {
                if (!roomCode) return;
                const constRoomRef = ref(db, `rooms/${roomCode}`);
                const unsubscribe = onValue(constRoomRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        setGame(data);
                        if (role === 'player') {
                            const foundPlayer = data.players?.find(p => p.id === myPlayer?.id);
                            if (foundPlayer) setMyPlayer(foundPlayer);
                        }
                    }
                });
                return () => unsubscribe();
            }, [roomCode, role]);

            // إنشاء غرفة جديدة كـ مسؤول اللعبة
            async function handleCreateRoom() {
                setBusy(true);
                const newCode = generateRoomCode();
                const initialState = defaultState(newCode);
                await set(ref(db, `rooms/${newCode}`), initialState);
                setRoomCode(newCode);
                setRole('host');
                setBusy(false);
            }

            // محاولة دخول غرفة موجودة كلاعب
            async function handleJoinRoom() {
                if (!roomCode) return;
                const cleanCode = roomCode.trim().toUpperCase();
                setBusy(true);
                const snapshot = await get(ref(db, `rooms/${cleanCode}`));
                if (snapshot.exists()) {
                    setRoomCode(cleanCode);
                    setRole('player');
                    setErrorMsg('');
                } else {
                    setErrorMsg('عذراً، رمز الغرفة غير موجود!');
                }
                setBusy(false);
            }

            // تسجيل اللاعب داخل الغرفة واختيار الفريق
            async function handlePlayerRegister() {
                if (!name.trim() || selectedTeam === null) return;
                const freshSnapshot = await get(ref(db, `rooms/${roomCode}`));
                const currentGame = freshSnapshot.val();
                let playersList = currentGame.players || [];
                
                const playerId = Math.random().toString(36).slice(2, 9);
                const pObj = { id: playerId, name: name.trim(), teamId: selectedTeam, joinedAt: Date.now() };
                playersList.push(pObj);
                
                await set(ref(db, `rooms/${roomCode}/players`), playersList);
                setMyPlayer(pObj);
            }

            // شاشة الدخول الرئيسية (المعدلة بناءً على طلبك)
            if (!role) {
                return (
                    <div class="flex flex-col items-center justify-center min-h-screen p-4 text-center">
                        <header class="mb-8">
                            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">
                                لعبة سياق
                            </h1>
                            <p class="text-slate-400 text-lg">اللوحة التفاعلية المدمجة للعبة الكلمات</p>
                        </header>

                        <div class="bg-slate-800/50 border border-slate-700/50 p-8 rounded-2xl shadow-2xl max-w-xl w-full backdrop-blur-md">
                            <h2 class="text-2xl font-bold text-amber-400 mb-4">مرحباً بك في سياق!</h2>
                            <p class="text-slate-300 mb-6 leading-relaxed">
                                تم ربط قواعد البيانات وبناء الواجهة بنجاح. اللعبة جاهزة الآن لبدء التحدي.
                            </p>
                            
                            <div class="space-y-4 max-w-sm mx-auto">
                                <input 
                                    type="text" 
                                    value={roomCode}
                                    onChange={(e) => setRoomCode(e.target.value)}
                                    placeholder="أدخل رمز الغرفة..." 
                                    class="w-full px-4 py-3 text-center bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-cyan-500 uppercase transition-colors"
                                />
                                {errorMsg && <p class="text-red-400 text-sm">{errorMsg}</p>}
                                
                                <button 
                                    onClick={handleJoinRoom}
                                    disabled={busy}
                                    class="w-full py-3 font-bold rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-slate-950 shadow-lg shadow-cyan-500/20 transition-all active:scale-95 disabled:opacity-50"
                                >
                                    دخول كلاعب
                                </button>
                                
                                <div class="relative flex py-2 items-center">
                                    <div class="flex-grow border-t border-slate-700"></div>
                                    <span class="flex-shrink mx-4 text-slate-500 text-sm">أو أوجه لوحة التحكم</span>
                                    <div class="flex-grow border-t border-slate-700"></div>
                                </div>

                                <button 
                                    onClick={handleCreateRoom}
                                    disabled={busy}
                                    class="w-full py-3 font-bold rounded-xl bg-slate-700 hover:bg-slate-600 text-white transition-all active:scale-95 disabled:opacity-50"
                                >
                                    إنشاء غرفة جديدة (الشاشة الرئيسية)
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // شاشة انتظار اللاعب واختيار فريقه
            if (role === 'player' && !myPlayer) {
                return (
                    <div class="flex flex-col items-center justify-center min-h-screen p-4 text-center">
                        <div class="bg-slate-800/50 border border-slate-700/50 p-8 rounded-2xl shadow-2xl max-w-md w-full backdrop-blur-md">
                            <h2 class="text-2xl font-bold text-cyan-400 mb-6">انضمام للغرفة: {roomCode}</h2>
                            <div class="space-y-4 text-right">
                                <div>
                                    <label class="block text-sm text-slate-400 mb-2">اسمك الكريم:</label>
                                    <input 
                                        type="text" 
                                        value={name} 
                                        onChange={(e) => setName(e.target.value)}
                                        class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-cyan-500"
                                        placeholder="اكتب اسمك هنا..."
                                    />
                                </div>
                                <div>
                                    <label class="block text-sm text-slate-400 mb-2">اختر فريقك:</label>
                                    <div class="grid grid-cols-2 gap-2">
                                        {game?.teams?.map((team) => (
                                            <button
                                                key={team.id}
                                                onClick={() => setSelectedTeam(team.id)}
                                                style={{ backgroundColor: selectedTeam === team.id ? team.color : '#1e293b', border: `2px solid ${team.color}` }}
                                                class="p-3 rounded-xl font-bold transition-all text-center"
                                            >
                                                {team.name}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <button
                                    onClick={handlePlayerRegister}
                                    disabled={!name.trim() || selectedTeam === null}
                                    class="w-full mt-4 py-3 bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold rounded-xl disabled:opacity-50 transition-colors"
                                >
                                    تأكيد الدخول والجاهزية
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // شاشات اللعب التفاعلية (المسؤول واللاعب) بعد الدخول بنجاح
            return (
                <div class="p-6 max-w-4xl mx-auto text-center">
                    <div class="bg-slate-800/80 p-4 rounded-xl border border-slate-700 mb-6 flex justify-between items-center">
                        <div>
                            <span class="text-slate-400">رمز الغرفة: </span>
                            <span class="text-xl font-bold text-amber-400 uppercase">{roomCode}</span>
                        </div>
                        <div class="text-lg bg-slate-900 px-4 py-1 rounded-lg border border-slate-700">
                            {role === 'host' ? '👑 شاشة العرض والتحكم' : `🎮 لاعب: ${myPlayer?.name}`}
                        </div>
                    </div>

                    <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-xl">
                        <p class="text-cyan-400 font-bold mb-2">المرحلة الحالية: {game?.phase === 'lobby' ? 'قاعة الانتظار' : 'بدء التحدي والأسئلة'}</p>
                        <h2 class="text-3xl font-extrabold text-white my-4">
                            {game?.phase === 'lobby' ? 'في انتظار انطلاق الجولة الأولى...' : QUESTIONS[game?.currentQuestionIdx || 0].text}
                        </h2>
                        
                        {game?.phase === 'lobby' && role === 'host' && (
                            <button 
                                onClick={async () => await set(ref(db, `rooms/${roomCode}/phase`), 'playing')}
                                class="mt-6 px-8 py-3 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold rounded-xl text-lg transition-transform active:scale-95"
                            >
                                إطلاق الجولة وبدء اللعب الآن 🚀
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

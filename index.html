<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سياق - التحكم الكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { background: #0a0f18; color: white; font-family: sans-serif; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        const { useState } = React;

        function App() {
            const [role, setRole] = useState(null); // 'host', 'display', 'player'
            const [room, setRoom] = useState('');
            const [buzzerOpen, setBuzzerOpen] = useState(true);
            const [errors, setErrors] = useState(0);

            // صفحة اختيار الدور (المدخل)
            if (!role) return (
                <div class="flex flex-col items-center justify-center min-h-screen p-6">
                    <h1 class="text-6xl font-black text-amber-400 mb-8">سياق</h1>
                    <input class="w-full max-w-sm p-4 bg-slate-900 border border-slate-700 rounded-2xl mb-4 text-center" 
                           placeholder="أدخل رمز الغرفة" onChange={e => setRoom(e.target.value)} />
                    <button class="w-full max-w-sm p-4 bg-amber-500 rounded-2xl font-bold mb-2" onClick={() => setRole('host')}>مقدم اللعبة</button>
                    <button class="w-full max-w-sm p-4 bg-slate-800 rounded-2xl font-bold mb-2" onClick={() => setRole('display')}>شاشة العرض</button>
                    <button class="w-full max-w-sm p-4 bg-cyan-600 rounded-2xl font-bold" onClick={() => setRole('player')}>متسابق</button>
                </div>
            );

            // واجهة المقدم (مع زر الأخطاء والكبس)
            if (role === 'host') return (
                <div class="p-6">
                    <div class="flex justify-between items-center mb-6 bg-slate-900 p-4 rounded-2xl">
                        <span class="text-amber-400 font-bold">الغرفة: {room || 'غير محدد'}</span>
                        <div class="flex gap-2">
                            <button onClick={() => setBuzzerOpen(!buzzerOpen)} class={`px-6 py-2 rounded-xl font-bold ${buzzerOpen ? 'bg-emerald-600' : 'bg-red-600'}`}>
                                {buzzerOpen ? 'الكبس مفتوح' : 'الكبس مقفل'}
                            </button>
                            <div class="flex gap-1">
                                {[1,2,3].map(i => (
                                    <button key={i} onClick={() => setErrors(i)} class={`w-10 h-10 rounded-lg ${errors >= i ? 'bg-red-500' : 'bg-slate-700'}`}>X</button>
                                ))}
                            </div>
                        </div>
                    </div>
                    {/* هنا مكان الجداول */}
                    <div class="grid grid-cols-2 gap-8">
                        <div class="bg-slate-900 p-6 rounded-2xl">...جدول الإجابات المكشوفة...</div>
                        <div class="bg-slate-900 p-6 rounded-2xl border-2 border-amber-500">...شاشة العرض (مخفية)...</div>
                    </div>
                </div>
            );

            return <div class="p-6">أهلاً بك في {role} (رمز الغرفة: {room})</div>;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

            },
            {

                answers: [
                    { text: "النوم والانسداح بدون منبه", points: 52 },
                    { text: "الفلوس والتحويلات البنكية غير المتوقعة", points: 31 },

        const playSynthSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                if (type === 'correct') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, ctx.currentTime); osc.frequency.setValueAtTime(880, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                    osc.start(); osc.stop(ctx.currentTime + 0.4);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(130, ctx.currentTime);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                    osc.start(); osc.stop(ctx.currentTime + 0.5);
                } else if (type === 'buzz') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(400, ctx.currentTime);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                }
            } catch(e) {}
        };

        const initialRoomState = (clearScores = false, currentTeams = null) => {
            const defaultTeams = {};
            for(let i=1; i<=8; i++) {
                const existingName = currentTeams?.[`team${i}`]?.name;
                defaultTeams[`team${i}`] = { 
                    name: existingName && existingName.trim() !== "" ? existingName : `فريق ${i}`, 
                    score: clearScores ? 0 : (currentTeams?.[`team${i}`]?.score || 0), 
                    errors: 0 
                };
            }
            return {
                currentCategory: "", activeTeam: "", buzzerOpen: true, revealed: {0:false,1:false,2:false,3:false,4:false}, roundActive: false, roundNumber: 1, questionText: "", currentAnswers: [],
                buzzerQueue: [], teams: defaultTeams
            };
        };

        function App() {
            const [role, setRole] = React.useState(null);
            const [room, setRoom] = React.useState('');
            const [gameState, setGameState] = React.useState(initialRoomState());
            const [localTeamName, setLocalTeamName] = React.useState('');
            const [showGithubMenu, setShowGithubMenu] = React.useState(false);
            const [gitSearch, setGitSearch] = React.useState('');

            React.useEffect(() => {
                if (!room) return;
                const roomRef = ref(db, `rooms/${room}`);
                const unsubscribe = onValue(roomRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        setGameState(prev => {
                            if (data.activeTeam && data.activeTeam !== prev.activeTeam) playSynthSound('buzz');
                            const prevRev = Object.values(prev.revealed || {}).filter(Boolean).length;
                            const newRev = Object.values(data.revealed || {}).filter(Boolean).length;
                            if (newRev > prevRev) playSynthSound('correct');
                            const prevErr = Object.values(prev.teams || {}).reduce((acc, t) => acc + (t.errors || 0), 0);
                            const newErr = Object.values(data.teams || {}).reduce((acc, t) => acc + (t.errors || 0), 0);
                            if (newErr > prevErr) playSynthSound('wrong');
                            return { ...prev, ...data };
                        });
                    } else if (role === 'host') {
                        set(roomRef, initialRoomState());
                    }
                });
                return () => unsubscribe();
            }, [room, role]);

            React.useEffect(() => {
                if (role && role.startsWith('team') && gameState.teams?.[role]) {
                    setLocalTeamName(gameState.teams[role].name);
                }
            }, [role, gameState.teams]);

            const updateDB = (updates) => update(ref(db, `rooms/${room}`), updates);

            const pressBuzzer = (teamKey) => {
                if (gameState.buzzerOpen && gameState.teams[teamKey].errors < 3) {
                    const roomRef = ref(db, `rooms/${room}`);
                    runTransaction(roomRef, (currentData) => {
                        if (!currentData) return currentData;
                        if (!currentData.buzzerQueue) currentData.buzzerQueue = [];
                        if (!currentData.buzzerQueue.includes(teamKey)) currentData.buzzerQueue.push(teamKey);
                        if (!currentData.activeTeam) currentData.activeTeam = currentData.buzzerQueue[0];
                        return currentData;
                    });
                }
            };

            const deploySelectedRound = (roundObj) => {
                const resetErrors = {};
                Object.keys(gameState.teams).forEach(k => { resetErrors[`teams/${k}/errors`] = 0; });
                
                updateDB({
                    currentCategory: roundObj.category,
                    questionText: roundObj.question,
                    currentAnswers: roundObj.answers,
                    roundActive: true,
                    revealed: {0:false,1:false,2:false,3:false,4:false},
                    activeTeam: "", buzzerQueue: [], buzzerOpen: true, ...resetErrors
                });
                setShowGithubMenu(false);
                setGitSearch('');
            };

            const triggerRandomCategory = () => {
                const randomRound = CURATED_ROUNDS[Math.floor(Math.random() * CURATED_ROUNDS.length)];
                deploySelectedRound(randomRound);
            };

            const triggerWrongAnswer = () => {
                if (gameState.activeTeam) {
                    const currentErrors = gameState.teams[gameState.activeTeam].errors;
                    const nextErrors = Math.min(currentErrors + 1, 3);
                    const updates = { [`teams/${gameState.activeTeam}/errors`]: nextErrors };

                    if (nextErrors >= 3) {
                        const nextQueue = gameState.buzzerQueue.filter(t => t !== gameState.activeTeam);
                        updates.buzzerQueue = nextQueue;
                        updates.activeTeam = nextQueue.length > 0 ? nextQueue[0] : "";
                    }
                    updateDB(updates);
                }
            };

            const passTurnToNextInQueue = () => {
                if (gameState.buzzerQueue && gameState.buzzerQueue.length > 1) {
                    const currentActive = gameState.activeTeam;
                    const nextQueue = gameState.buzzerQueue.filter(t => t !== currentActive);
                    updateDB({ buzzerQueue: nextQueue, activeTeam: nextQueue.length > 0 ? nextQueue[0] : "" });
                } else {
                    updateDB({ activeTeam: "", buzzerQueue: [] });
                }
            };

            const endRound = () => {
                updateDB({ currentCategory: "", roundActive: false, activeTeam: "", buzzerQueue: [], roundNumber: gameState.roundNumber + 1 });
            };

            const resetWholeRoomState = () => {
                if(confirm("هل أنت متأكد من تصفير النقاط؟ (سيتم الحفاظ على أسماء اللاعبين الحاليين دون تغيير)")) {
                    set(ref(db, `rooms/${room}`), initialRoomState(true, gameState.teams));
                }
            };

            const clickRevealAnswer = (idx, points) => {
                const updates = { [`revealed/${idx}`]: true };
                if (gameState.activeTeam) {
                    const currentScore = gameState.teams[gameState.activeTeam].score;
                    updates[`teams/${gameState.activeTeam}/score`] = currentScore + points;
                }
                updateDB(updates);
            };

            const saveTeamName = () => {
                if (localTeamName.trim()) updateDB({ [`teams/${role}/name`]: localTeamName.trim() });
            };

            const filteredRounds = CURATED_ROUNDS.filter(r => 
                r.category.toLowerCase().includes(gitSearch.toLowerCase()) || 
                r.question.toLowerCase().includes(gitSearch.toLowerCase())
            );

            if (!role) return (
                <div className="flex flex-col items-center justify-center min-h-screen gap-6 p-4 max-w-md mx-auto">
                    <h1 className="text-6xl font-black text-blue-500 mb-2 tracking-wider">سياق</h1>
                    <input className="p-4 rounded-2xl bg-[#111936] border-2 border-[#1E295D] text-center text-xl w-full text-white focus:border-blue-500 outline-none" 
                           placeholder="أدخل رمز الغرفة الموحد" value={room} onChange={e => setRoom(e.target.value.toUpperCase())} />
                    <div className="grid grid-cols-1 gap-3 w-full">
                        <button disabled={!room} className="bg-blue-600 disabled:opacity-30 p-4 rounded-2xl font-bold text-white text-lg" onClick={() => setRole('host')}>لوحة التحكم (المقدم)</button>
                        <button disabled={!room} className="bg-[#111936] border border-[#1E295D] disabled:opacity-30 p-4 rounded-2xl font-bold text-lg" onClick={() => setRole('display')}>شاشة العرض (الجمهور)</button>
                        <div className="grid grid-cols-2 gap-2">
                            {Object.keys(gameState.teams).map((tKey, idx) => (
                                <button key={tKey} disabled={!room} className="bg-[#1E295D] text-sm disabled:opacity-30 p-3 rounded-xl font-bold" onClick={() => setRole(tKey)}>لاعب: فريق {idx + 1}</button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            if (role.startsWith('team')) {
                const myTurn = gameState.activeTeam === role;
                const hasThreeErrors = gameState.teams[role]?.errors >= 3;
                const allowed = gameState.buzzerOpen && !gameState.activeTeam && !hasThreeErrors;
                
                return (
                    <div className="flex flex-col justify-between min-h-screen p-4 max-w-2xl mx-auto w-full">
                        <div className="panel-bg rounded-2xl p-4 flex flex-col gap-3 w-full shadow-md">
                            <div className="flex justify-between items-center text-xs text-slate-400">
                                <button onClick={() => setRole(null)} className="bg-red-950/60 hover:bg-red-900 border border-red-800 text-red-300 font-bold px-3 py-1 rounded-lg transition-all">🚪 خروج</button>
                                <div className="flex gap-1">
                                    {[1, 2, 3].map(i => (
                                        <div key={i} className={`w-5 h-5 rounded flex items-center justify-center font-bold text-[10px] border ${gameState.teams[role]?.errors >= i ? 'bg-red-600 border-red-400 text-white' : 'bg-slate-900 border-slate-700 text-slate-600'}`}>X</div>
                                    ))}
                                </div>
                            </div>
                            <div className="flex items-center gap-2 bg-[#0B132B] p-2 rounded-xl border border-blue-950">
                                <span className="text-xs text-blue-400 font-bold whitespace-nowrap">اسمك باللعبة:</span>
                                <input className="bg-transparent text-white font-bold text-sm w-full outline-none focus:text-blue-400" 
                                       value={localTeamName} onChange={e => setLocalTeamName(e.target.value)} placeholder="اكتب أسماءكم هنا..." />
                                <button onClick={saveTeamName} className="bg-blue-600 text-white p-1.5 px-3 rounded-lg text-xs font-bold whitespace-nowrap active:scale-95 transition-all">✔️ حفظ</button>
                            </div>
                            
                            <div className="bg-gradient-to-r from-amber-600 to-amber-500 text-slate-950 font-black text-center p-2.5 rounded-xl text-xs shadow-inner mt-1 animate-pulse">
                                🏆 مجموع نقاطكم الحالية: {gameState.teams[role]?.score || 0} ن
                            </div>
                        </div>

                        {gameState.roundActive ? (
                            <div className="board-bg rounded-2xl p-4 my-3 flex flex-col gap-4 shadow-lg">
                                <div className="text-center">
                                    <p className="text-[11px] text-slate-400 mb-1">سألنا 100 شخص من الواقع...</p>
                                    <h3 className="text-sm md:text-base font-black text-white leading-relaxed">{gameState.questionText}</h3>
                                </div>

                                <div className="grid grid-cols-1 gap-2">
                                    {gameState.currentAnswers && gameState.currentAnswers.map((ans, idx) => {
                                        const isRevealed = gameState.revealed?.[idx];
                                        return (
                                            <div key={idx} className={`rounded-xl px-3 py-2.5 flex justify-between items-center text-xs font-bold border transition-all h-12
                                                ${isRevealed ? 'bg-[#131C38] border-emerald-500/30 text-emerald-400' : 'bg-[#0B132B]/60 border-blue-950 text-slate-500'}`}>
                                                <div>{isRevealed ? `${ans.points}+` : '?'}</div>
                                                <div className="flex items-center gap-2 flex-row-reverse">
                                                    <span className="w-5 h-5 rounded-full bg-blue-900/20 text-blue-400 text-[10px] flex items-center justify-center border border-blue-800/20">{idx + 1}</span>
                                                    <span>{isRevealed ? ans.text : "•••••••••••••"}</span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ) : (
                            <div className="text-center text-slate-500 text-xs py-12">بانتظار أن يبدأ المقدم جولة عشوائية أو يختار موضوعاً...</div>
                        )}

                        <div className="flex justify-center pb-4">
                            {hasThreeErrors ? (
                                <div className="w-44 h-44 rounded-full bg-red-950/80 border-4 border-red-700 flex flex-col items-center justify-center shadow-xl">
                                    <span className="text-white font-black text-lg">مستبعد!</span>
                                    <span className="text-red-400 text-[10px] mt-0.5">3 أخطاء</span>
                                </div>
                            ) : (
                                <button onClick={() => pressBuzzer(role)} disabled={!allowed}
                                        className={`w-44 h-44 rounded-full font-black text-xl shadow-2xl transition-all duration-75 touch-manipulation
                                        ${myTurn ? 'bg-emerald-500 scale-105 text-white animate-pulse' : allowed ? 'bg-red-600 active:scale-95 text-white' : 'bg-slate-800 text-slate-600 cursor-not-allowed'}`}>
                                    {myTurn ? 'دوركم أجب!' : allowed ? 'إكبس!' : 'انتظر'}
                                </button>
                            )}
                        </div>
                    </div>
                );
            }

            const renderMainDashboard = (isHostMode) => {
                return (
                    <div className="p-4 md:p-6 min-h-screen flex flex-col justify-between max-w-[1600px] mx-auto relative">
                        <div className="panel-bg rounded-2xl p-4 flex flex-wrap justify-between items-center gap-4 mb-4 shadow-xl">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setRole(null)} className="bg-red-950/60 hover:bg-red-900 border border-red-800 text-red-300 font-bold px-4 py-1.5 rounded-xl text-sm transition-all">🚪 خروج</button>
                                <span className="bg-blue-600 text-white font-bold px-4 py-1.5 rounded-xl text-sm">{isHostMode ? 'لوحة المقدم' : 'شاشة العرض'}</span>
                                <span className="bg-amber-500/20 text-amber-400 font-bold px-4 py-1.5 rounded-xl text-sm border border-amber-500/30">الجولة {gameState.roundNumber}</span>
                            </div>
                            
                            <div className="flex items-center gap-2 flex-wrap max-w-3xl justify-center">
                                {Object.keys(gameState.teams).map(tKey => {
                                    const isSelected = gameState.activeTeam === tKey;
                                    const isBlocked = gameState.teams[tKey]?.errors >= 3;
                                    return (
                                        <div key={tKey} className={`px-3 py-1.5 rounded-full text-xs font-bold border transition-all flex items-center gap-1.5
                                            ${isSelected ? 'bg-emerald-600 border-emerald-400 scale-105 text-white' : isBlocked ? 'bg-red-950/40 border-red-900/60 text-red-400 opacity-50' : 'bg-[#1C2646] border-[#2A3B7C] text-slate-300'}`}>
                                            <span>{gameState.teams[tKey]?.name || tKey}: {gameState.teams[tKey]?.score || 0} ن</span>
                                            {(gameState.teams[tKey]?.errors || 0) > 0 && <span className="text-red-500 font-black">({ "X".repeat(gameState.teams[tKey].errors) })</span>}
                                        </div>
                                    );
                                })}
                            </div>
                            <div className="font-bold text-amber-400 text-sm font-mono">الغرفة: <span className="text-white text-base">{room}</span></div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start my-auto w-full relative">
                            <div className="lg:col-span-3 flex flex-col gap-4 w-full relative">
                                <div className="panel-bg rounded-2xl p-4 shadow-lg">
                                    <h4 className="text-xs font-bold text-slate-400 mb-2 uppercase tracking-wide">ترتيب الكبس والدور الحالي</h4>
                                    <div className="bg-[#0B132B] border border-blue-900/60 rounded-xl p-4 min-h-[90px] flex flex-col justify-center gap-2">
                                        {gameState.activeTeam ? (
                                            <div>
                                                <p className="text-emerald-400 font-black text-sm">💡 الدور الحالي: {gameState.teams[gameState.activeTeam]?.name}</p>
                                                {gameState.buzzerQueue && gameState.buzzerQueue.length > 1 && (
                                                    <p className="text-slate-400 text-[11px] mt-1">التالي بالانتظار: {gameState.buzzerQueue.slice(1).map(k => gameState.teams[k]?.name || k).join(' ← ')}</p>
                                                )}
                                            </div>
                                        ) : (
                                            <p className="text-slate-500 text-xs text-center">بانتظار كبس المتسابقين...</p>
                                        )}
                                    </div>
                                </div>

                                {isHostMode && (
                                    <div className="panel-bg rounded-2xl p-4 shadow-lg flex flex-col gap-3 relative">
                                        <h4 className="text-xs font-bold text-amber-400 uppercase tracking-wide">أوامر الجولات والتحكم</h4>
                                        
                                        <div className="relative">
                                            <button onClick={() => setShowGithubMenu(!showGithubMenu)} 
                                                    className="w-full bg-[#1F2937] hover:bg-[#374151] border border-[#4B5563] text-white font-bold p-3 rounded-xl text-xs flex items-center justify-between transition-all shadow-md">
                                                <span>📂 إدارة الجولات والبحث عن موضوع</span>
                                                <span className="text-[10px] opacity-60">▾</span>
                                            </button>

                                            {showGithubMenu && (
                                                <div className="absolute right-0 top-full mt-2 w-72 bg-[#161b22] border border-[#30363d] rounded-xl shadow-2xl z-50 flex flex-col text-right overflow-hidden">
                                                    <div className="p-3 border-b border-[#30363d] flex justify-between items-center bg-[#1f242c]">
                                                        <span className="text-xs font-bold text-[#c9d1d9]">اختر التصنيف أو ابحث بالكلمة</span>
                                                        <button onClick={() => setShowGithubMenu(false)} className="text-[#8b949e] hover:text-white font-bold text-sm">✕</button>
                                                    </div>
                                                    
                                                    <div className="p-2 border-b border-[#30363d]">
                                                        <input type="text" value={gitSearch} onChange={e => setGitSearch(e.target.value)}
                                                               className="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-2 text-xs text-white outline-none focus:border-blue-500"
                                                               placeholder="ابحث عن تصنيف أو كلمة داخل السؤال..." />
                                                    </div>

                                                    <div className="max-h-64 overflow-y-auto flex flex-col bg-[#0d1117]">
                                                        {filteredRounds.length > 0 ? (
                                                            filteredRounds.map((round, rIdx) => (
                                                                <button key={rIdx} onClick={() => deploySelectedRound(round)}
                                                                        className="w-full text-right p-3 hover:bg-[#1f242c] border-b border-[#21262d]/50 text-xs text-[#c9d1d9] hover:text-blue-400 transition-all flex flex-col gap-0.5">
                                                                    <span className="font-bold text-blue-500 text-[10px]">📁 {round.category}</span>
                                                                    <span className="text-slate-300 truncate w-full">{round.question}</span>
                                                                </button>
                                                            ))
                                                        ) : (
                                                            <div className="p-4 text-center text-xs text-slate-500">لا توجد جولات تطابق البحث!</div>
                                                        )}
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <button onClick={triggerRandomCategory} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded-xl text-xs transition-all shadow-md">
                                            🎲 جولة عشوائية سريعة
                                        </button>
                                        
                                        {gameState.roundActive && (
                                            <div className="flex flex-col gap-2 border-t border-slate-800 pt-3">
                                                <button onClick={triggerWrongAnswer} disabled={!gameState.activeTeam} className={`w-full p-3 rounded-xl font-bold text-xs transition-all ${gameState.activeTeam ? 'bg-red-600 text-white hover:bg-red-700' : 'bg-slate-800 text-slate-500 cursor-not-allowed'}`}>
                                                    ❌ احتساب خطأ على الفريق الحالي
                                                </button>
                                                <button onClick={passTurnToNextInQueue} disabled={!gameState.activeTeam} className={`w-full p-3 rounded-xl font-bold text-xs transition-all ${gameState.activeTeam ? 'bg-indigo-600 text-white hover:bg-indigo-700' : 'bg-slate-800 text-slate-500 cursor-not-allowed'}`}>
                                                    ➡️ تحويل الدور للفريق التالي
                                                </button>
                                                <button onClick={endRound} className="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 p-3 rounded-xl font-bold text-xs transition-all mt-2">
                                                    🏁 إنهاء الجولة وحفظ النتائج
                                                </button>
                                            </div>
                                        )}

                                        <div className="border-t border-red-900/40 pt-2 mt-2">
                                            <button onClick={resetWholeRoomState} className="w-full bg-red-950/60 hover:bg-red-900/80 border border-red-800/80 text-red-200 p-2.5 rounded-xl font-bold text-xs transition-all">
                                                🔄 تصفير النقاط وبدء قيم جديد
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="lg:col-span-9 w-full">
                                {!gameState.roundActive ? (
                                    <div className="board-bg rounded-3xl p-12 text-center flex flex-col items-center justify-center min-h-[450px]">
                                        <p className="text-slate-400 text-lg font-medium animate-pulse">بانتظار قيام المقدم بتوليد جولة عشوائية أو اختيار موضوع...</p>
                                    </div>
                                ) : (
                                    <div className="board-bg rounded-3xl p-6 md:p-8 shadow-2xl relative">
                                        <div className="text-center mb-4">
                                            <span className="bg-amber-500 text-slate-950 font-extrabold text-xs px-4 py-1 rounded-full uppercase tracking-wide">{gameState.currentCategory}</span>
                                            <p className="text-xs md:text-sm text-slate-400 mt-4 mb-2 font-medium">سألنا 100 شخص والإجابات منطقية ومترابطة...</p>
                                            <h2 className="text-xl md:text-3xl font-black text-white px-4 leading-snug">{gameState.questionText}</h2>
                                        </div>

                                        <div className="flex justify-center gap-3 mb-6">
                                            {[1, 2, 3].map(i => {
                                                const hasError = gameState.activeTeam && gameState.teams?.[gameState.activeTeam] && gameState.teams[gameState.activeTeam].errors >= i;
                                                return (
                                                    <div key={i} className={`w-10 h-10 md:w-11 md:h-11 rounded-xl flex items-center justify-center font-black text-lg border-2 transition-all shadow-md
                                                        ${hasError ? 'bg-red-600 border-red-400 text-white animate-bounce' : 'bg-[#0B132B] border-blue-900/60 text-slate-800'}`}>
                                                        X
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        <div className="grid grid-cols-1 gap-3 max-w-3xl mx-auto w-full">
                                            {gameState.currentAnswers && gameState.currentAnswers.map((ans, idx) => {
                                                const isRevealed = gameState.revealed?.[idx];
                                                return (
                                                    <div key={idx} onClick={() => isHostMode && clickRevealAnswer(idx, ans.points)}
                                                         className={`rounded-xl p-4 flex justify-between items-center h-16 transition-all shadow-md border text-sm md:text-base font-bold
                                                            ${isRevealed ? 'bg-[#131C38] border-emerald-500/40 text-emerald-400' : 'bg-[#0B132B]/80 border-blue-950 text-slate-400'} 
                                                            ${isHostMode ? 'cursor-pointer hover:border-blue-700' : ''}`}>
                                                        <div>
                                                            {isRevealed ? (
                                                                <span className="text-amber-400 font-mono font-black">{ans.points}+</span>
                                                            ) : isHostMode ? (
                                                                <span className="text-amber-400/50 font-mono text-xs text-slate-500">({ans.points}+)</span>
                                                            ) : (
                                                                <span className="text-slate-800 font-mono">?</span>
                                                            )}
                                                        </div>
                                                        <div className="flex items-center gap-3 flex-row-reverse">
                                                            <span className="w-6 h-6 rounded-full bg-blue-900/30 text-blue-400 text-xs flex items-center justify-center border border-blue-800/40">{idx + 1}</span>
                                                            {isRevealed ? (
                                                                <span className="text-white text-right">{ans.text}</span>
                                                            ) : isHostMode ? (
                                                                <span className="text-slate-400 text-right opacity-80 font-medium">🛡️ {ans.text}</span>
                                                            ) : (
                                                                <span className="text-slate-700 tracking-widest font-mono">•••••••••••••</span>
                                                            )}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="h-4"></div>
                    </div>
                );
            };

            if (role === 'host') return renderMainDashboard(true);
            if (role === 'display') return renderMainDashboard(false);
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

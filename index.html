            { category: 'تقنية وجوالات', text: 'حركة يفعلها الشخص فوراً إذا علق أو هنّج جواله بالكامل وما استجاب', answers: [ { text: 'إعادة تشغيل إجباري (Restart)', points: 55 }, { text: 'النقر بقوة على الشاشة عدة مرات', points: 20 }, { text: 'ترك الجوال فتره حتى يهدأ ويندمل', points: 12 }, { text: 'توصيل الجوال بالشاحن الكهربائي', points: 8 }, { text: 'فك كفر أو غطاء الحماية الخارجي', points: 5 } ] },
            { category: 'تقنية وجوالات', text: 'أكثر شيء يستهلك بطارية الجوال بسرعة خيالية خلال اليوم', answers: [ { text: 'ألعاب الفيديو الثقيلة ومعدل الإطارات العالي', points: 40 }, { text: 'سطوع الشاشة الكامل والتلقائي العالي', points: 25 }, { text: 'استخدام الـ GPS وتطبيقات الخرائط والتنقل', points: 18 }, { text: 'تصوير الفيديوهات بدقة 4K العالية', points: 12 }, { text: 'تشغيل البيانات الخلوية 5G بالخلفية', points: 5 } ] },
            { category: 'تقنية وجوالات', text: 'أول أكسسوار يحرص المشتري على تركيبه لحماية الجوال الجديد من الكسر', answers: [ { text: 'ستيكر حماية زجاجي للشاشة الأمامية', points: 55 }, { text: 'كفر حماية خلفي مقاوم للصدمات', points: 30 }, { text: 'حامي زجاجي لعدسات الكاميرا الخلفية', points: 8 }, { text: 'مسكة خلفية للجوال أو استاند للوقوف', points: 5 }, { text: 'تعليقة أو حبل يدوي للجوال', points: 2 } ] },
            { category: 'تقنية وجوالات', text: 'أشهر نظام تشغيل للهواتف الذكية يمتلك أكبر حصة استخدام بالعالم', answers: [ { text: 'أندرويد (Android)', points: 55 }, { text: 'آي أو إس (iOS للأيفون)', points: 40 }, { text: 'ويندوز فون', points: 3 }, { text: 'هارموني (هواوي)', points: 2 } ] },
            { category: 'تقنية وجوالات', text: 'أكثر ماركة لابتوب منتشرة ومحبوبة للدراسة والعمل المكتبي خفيفة الوزن', answers: [ { text: 'أبل ماك بوك (MacBook)', points: 40 }, { text: 'ديل (Dell)', points: 25 }, { text: 'اتش بي (HP)', points: 18 }, { text: 'لينوفو (Lenovo)', points: 12 }, { text: 'أسوس (Asus)', points: 5 } ] },
            { category: 'تقنية وجوالات', text: 'أشهر منصة لشراء ألعاب الكمبيوتر (PC Gaming) الرقمية وتجميعها الحساب', answers: [ { text: 'ستيم (Steam)', points: 65 }, { text: 'إيبك جيمز (Epic Games)', points: 18 }, { text: 'إكس بوكس جيم باس (Game Pass)', points: 10 }, { text: 'بليزارد (Battle.net)', points: 5 }, { text: 'إي أيه (EA Play)', points: 2 } ] },
            { category: 'تقنية وجوالات', text: 'أكثر كرت شاشة (GPU) مطلوب من اللاعبين لأجهزة البي سي لقوته وتصميمه المتقدم', answers: [ { text: 'كرت RTX 4090 العالي', points: 45 }, { text: 'كرت RTX 4070 أو السوبر المعتدل', points: 25 }, { text: 'كرت RTX 3060 الاقتصادي الشهير', points: 15 }, { text: 'كرت RTX 4080 المتطور', points: 10 }, { text: 'كروت AMD المتنوعة', points: 5 } ] },
            { category: 'تقنية وجوالات', text: 'سبب رئيسي يجعل الناس يشترون ساعات ذكية الرياضة البديلة', answers: [ { text: 'تتبع نبضات القلب والأنشطة الرياضية والخطوات', points: 45 }, { text: 'قراءة الإشعارات والرسائل بدون فتح الجوال', points: 25 }, { text: 'الشكل والأناقة والمظهر العصري للبس', points: 15 }, { text: 'معرفة الوقت والتنبيهات المخصصة', points: 10 }, { text: 'ميزة الاتصال والرد السريع من المعصم', points: 5 } ] },
            { category: 'تقنية وجوالات', text: 'أكثر مكان مشهور يذهب إليه الناس لتصليح أو صيانة أجهزتهم الذكية بالرياض أو جدة', answers: [ { text: 'مرسلات أو حراج الكمبيوتر بالصالحية', points: 50 }, { text: 'شارع فلسطين بجدة للاتصالات', points: 25 }, { text: 'الوكيل الرسمي المعتمد للجهاز برقم الضمان', points: 15 }, { text: 'جرير أو إكسترا للخدمات السريعة', points: 7 }, { text: 'محلات الحي العادية الصغيرة', points: 3 } ] },

            // قهوة وشاهي
            { category: 'قهوة وشاهي', text: 'أشهر أداة فلترة وتقطير تستخدم حالياً لإعداد القهوة المختصة السوداء', answers: [ { text: 'أداة V60 الشهيرة الخزفية أو الزجاجية', points: 55 }, { text: 'آلة الإسبريسو التجارية المتقدمة والمكابس', points: 20 }, { text: 'أداة الكيمكس الزجاجية الأنيقة للفلاتر السميكة', points: 12 }, { text: 'أداة الفرنش بريس السريعة بالنقع', points: 8 }, { text: 'الآيروبريس البلاستيكية المناسبة للرحلات والسفر', points: 5 } ] },
            { category: 'قهوة وشاهي', text: 'نوع مشروب قهوة بارد ومطلوب بكثرة في فصل الصيف الحار بالـ كافيهات', answers: [ { text: 'آيس سبانش لاتيه المحلى', points: 40 }, { text: 'V60 بارد (آيس دريب منعش)', points: 30 }, { text: 'آيس لاتيه كلاسيك عادي بالحليب', points: 15 }, { text: 'كولد برو (القهوة المقطرة الباردة المنقوعة)', points: 10 }, { text: 'أفوجاتو مع الآيسكريم الفانيليا', points: 5 } ] },
            { category: 'قهوة وشاهي', text: 'أشهر دولة تشتهر بإنتاج وتصدير أجود وأفخم محاصيل البُن بالعالم', answers: [ { text: 'إثيوبيا (موطن البن الأصلي والفاكهي)', points: 45 }, { text: 'كولومبيا (المحاصيل المتوازنة الشوكولاتية)', points: 25 }, { text: 'اليمن (البن الخولاني العريق الفاخر)', points: 15 }, { text: 'البرازيل (أكبر كمية إنتاج تجاري عالمي للخلطات)', points: 10 }, { text: 'السلفادور أو غواتيمالا للإيحاءات الحمضية', points: 5 } ] },
            { category: 'قهوة وشاهي', text: 'مكون إضافي يوضع مع القهوة السعودية والخليجية يمنحها الطعم واللون الأصفر المميز', answers: [ { text: 'الهيل المطحون الطازج الفواح', points: 50 }, { text: 'الزعفران الأصلي للون والرائحة الملكية', points: 25 }, { text: 'المسمار (القرنفل العطري للنكهة الحارة)', points: 13 }, { text: 'الزنجبيل المطحون للتدفئة بـ الشتاء', points: 8 }, { text: 'الخلطة الجاهزة للقهوة (القصيم وغيرها)', points: 4 } ] },
            { category: 'قهوة وشاهي', text: 'أهم خطوة أو أداة يركز عليها باريستا القهوة المختصة لضبط طعم كوب الـ V60 ومنع المرارة', answers: [ { text: 'درجة وطحن البن بـ مطحنة كهربائية متناسقة تروس', points: 40 }, { text: 'حرارة الماء المستخدم بالترشيح والتقطير المقاس', points: 25 }, { text: 'نسبة الاستخلاص والريشيو (تناسب وزن البن والماء)', points: 18 }, { text: 'نوع وجودة الفلتر الورقي وغسله بالكامل قبل الصب', points: 12 }, { text: 'وقت الترشيح الكلي وزمن الترطيب الأولي للغازات', points: 5 } ] }
        ];

        function defaultState(roomCode) {
          const teams = [];
          for (let i = 0; i < 8; i++) {
             teams.push({ id: i, name: `فريق ${i + 1}`, color: TEAM_COLORS[i], score: 0 });
          }
          return {
            roomCode, phase: 'lobby', round: 1, maxRounds: 5,
            teams: teams, players: [], currentQuestion: null, usedQuestions: [],
            buzzedTeamId: null, buzzedPlayerName: '', errors: 0, roundPoints: 0,
            activeTeamTurn: null
          };
        }

        function App() {
          const [roomCode, setRoomCode] = useState('');
          const [role, setRole] = useState(null);
          const [game, setGame] = useState(null);
          const [myName, setMyName] = useState('');
          const [myTeam, setMyTeam] = useState(0);
          const [joined, setJoined] = useState(false);

          const audioContextRef = useRef(null);

          // وظيفة توليد صوت صفارة ميكانيكية عند الكبس اللحظي للأزرار
          const playBuzzerSound = () => {
             try {
                if (!audioContextRef.current) {
                   audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
                }
                const ctx = audioContextRef.current;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(440, ctx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.4);
             } catch (e) {
                console.log("Audio play blocked or unsupported:", e);
             }
          };

          useEffect(() => {
            if (!roomCode) return;
            return onValue(ref(db, `rooms/${roomCode}`), (snap) => {
              const val = snap.val();
              if (val) {
                 // تشغيل تنبيه صوتي فوري بجوال الكابس وفي الشاشات حال قفل البازر فجأة
                 if (game && game.buzzedTeamId === null && val.buzzedTeamId !== null) {
                    playBuzzerSound();
                 }
                 setGame(val);
              }
            });
          }, [roomCode, game]);

          const initRoom = async (chosenRole) => {
            let code = roomCode.trim().toUpperCase();
            if (chosenRole === 'host' && !code) {
              code = Math.random().toString(36).slice(2, 6).toUpperCase();
              await set(ref(db, `rooms/${code}`), defaultState(code));
            }
            setRoomCode(code);
            setRole(chosenRole);
          };

          const joinAsPlayer = async () => {
            if (!myName.trim()) return alert("يرجى كتابة الاسم الكريم!");
            const currentPlayers = game.players || [];
            
            // احتساب قفل الانضمام للفريق إذا وصل 4 متسابقين كحد أقصى لحماية التوازن
            const teamPlayersCount = currentPlayers.filter(p => p.teamId === myTeam).length;
            if (teamPlayersCount >= 4) {
               return alert("هذا الفريق ممتلئ! (الحد الأقصى 4 لاعبين لكل فريق)");
            }

            const newPlayer = { name: myName.trim(), teamId: myTeam };
            await set(ref(db, `rooms/${roomCode}/players`), [...currentPlayers, newPlayer]);
            setJoined(true);
          };

          const selectQuestion = async (cat) => {
            const pool = QUESTIONS.filter(q => q.category === cat && !(game.usedQuestions || []).includes(q.text));
            if (!pool.length) return alert('انتهت جميع أسئلة هذا القسم ببنك المعلومات السحابي!');
            const q = pool[Math.floor(Math.random() * pool.length)];
            
            await update(ref(db, `rooms/${roomCode}`), {
              currentQuestion: { text: q.text, category: q.category, answers: q.answers.map(a => ({...a, revealed: false})) },
              usedQuestions: [...(game.usedQuestions || []), q.text],
              buzzedTeamId: null, buzzedPlayerName: '', errors: 0, roundPoints: 0, activeTeamTurn: null
            });
          };

          const triggerBuzzer = async () => {
            if (game.buzzedTeamId !== null) return; 
            const player = (game.players || []).find(p => p.name === myName);
            if (!player) return;
            
            playBuzzerSound(); // تشغيل صوتي محلي فوري للاعب الكابس
            await update(ref(db, `rooms/${roomCode}`), {
              buzzedTeamId: player.teamId,
              buzzedPlayerName: player.name,
              activeTeamTurn: player.teamId
            });
          };

          const revealAnswer = async (idx) => {
            if (game.buzzedTeamId === null) return alert("لا يمكن كشف الإجابات قبل أن يقوم أحد المتسابقين بكبس الزر لتحديد المستحق تلقائياً!");
            const ans = game.currentQuestion.answers[idx];
            if (ans.revealed) return;
            
            const updatedAnswers = [...game.currentQuestion.answers];
            updatedAnswers[idx].revealed = true;
            
            // تنقيط تلقائي فوري ومباشر للفريق الذي كبس وحجز الدور حالياً
            const updatedTeams = [...game.teams];
            updatedTeams[game.buzzedTeamId].score += ans.points;
            
            await update(ref(db, `rooms/${roomCode}`), {
              'currentQuestion/answers': updatedAnswers,
              roundPoints: game.roundPoints + ans.points,
              teams: updatedTeams
            });
          };

          const addError = async () => {
            if (game.buzzedTeamId === null) return alert("لا يوجد فريق كابس حالياً لاحتساب الخطأ عليه تلقائياً!");
            if (game.errors >= 3) return alert("تم استهلاك الأخطاء الثلاثة للجولة بالكامل!");
            
            await update(ref(db, `rooms/${roomCode}`), { errors: game.errors + 1 });
          };

          const clearBuzzer = async () => {
            await update(ref(db, `rooms/${roomCode}`), { buzzedTeamId: null, buzzedPlayerName: '' });
          };

          const nextRound = async () => {
             await update(ref(db, `rooms/${roomCode}`), {
                round: game.round + 1,
                currentQuestion: null,
                roundPoints: 0,
                errors: 0,
                buzzedTeamId: null,
                buzzedPlayerName: ''
             });
          };

          // دالة للتحقق من شرط بدء اللعب: أن يكون لكل فريق مشارك لاعب واحد كحد أدنى
          const canStartGame = () => {
             const players = game?.players || [];
             if (players.length === 0) return false;
             // استخراج معرفات الفرق التي اختارها اللاعبون المتواجدون باللوبي
             const uniqueTeamsWithPlayers = new Set(players.map(p => p.teamId));
             return uniqueTeamsWithPlayers.size >= 1; 
          };

          if (!role) {
            return (
              <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center">
                <h1 class="text-6xl font-black mb-3 text-amber-400 drop-shadow-lg tracking-wider">سِيَاق الرّوتِين 🎯</h1>
                <p class="text-slate-400 mb-10 max-w-lg text-sm md:text-base">النسخة الكبرى للمجالس: 8 فرق بالكامل، تنقيط تلقائي ذكي مرتبطة بالكبس، وصوت صفارة ميكانيكية لحظي</p>
                <div class="w-full max-w-md space-y-4 bg-slate-900/60 p-6 rounded-3xl border border-slate-800 backdrop-blur">
                  <input value={roomCode} onChange={e => setRoomCode(e.target.value)} placeholder="أدخل رمز الغرفة العشوائي" class="w-full p-4 bg-slate-950 border border-slate-800 rounded-2xl text-center text-amber-300 uppercase font-mono font-black text-2xl tracking-widest focus:border-amber-500 focus:outline-none transition-all"/>
                  <button onClick={() => initRoom('host')} class="w-full p-4 bg-amber-500 text-slate-950 font-black rounded-2xl text-lg shadow-xl shadow-amber-500/10 hover:bg-amber-400 transition-all transform active:scale-95">🎙️ دخول كمقدم اللعبة الرئيسي</button>
                  <button onClick={() => initRoom('display')} class="w-full p-4 bg-slate-800 hover:bg-slate-700 font-bold rounded-2xl text-lg transition-all text-white">🖥️ شاشة العرض الكبرى للمجلس</button>
                  <button onClick={() => initRoom('player')} class="w-full p-4 bg-cyan-600 hover:bg-cyan-500 font-bold rounded-2xl text-lg transition-all text-white shadow-lg shadow-cyan-600/10">📱 دخول كمتسابق بكباسة الجوال</button>
                </div>
              </div>
            );
          }

          if (role === 'player' && !joined) {
            return (
              <div class="flex flex-col items-center justify-center min-h-screen p-4">
                <div class="bg-slate-900 p-6 rounded-3xl w-full max-w-lg border border-slate-800 shadow-2xl">
                  <h2 class="text-2xl font-black mb-6 text-center text-amber-400">انضمام متسابق للغرفة ({roomCode})</h2>
                  <input value={myName} onChange={e => setMyName(e.target.value)} placeholder="اكتب اسمك الحقيقي الثلاثي" class="w-full p-4 bg-slate-950 rounded-xl mb-5 text-center text-white text-lg font-bold border border-slate-800 focus:border-cyan-500 focus:outline-none"/>
                  
                  <label class="block mb-3 text-sm font-semibold text-slate-400 text-right">اختر فريقك المخصص (1-8):</label>
                  <div class="grid grid-cols-4 gap-2 mb-6">
                     {TEAM_COLORS.map((color, i) => {
                        const count = (game?.players || []).filter(p => p.teamId === i).length;
                        return (
                          <button key={i} onClick={() => setMyTeam(i)} disabled={count >= 4} class={`p-3 rounded-xl font-bold text-white transition-all text-xs flex flex-col items-center justify-center relative ${count >= 4 ? 'opacity-30 cursor-not-allowed bg-slate-950' : ''}`} style={{ backgroundColor: myTeam === i ? color : '#1e293b', border: `2px solid ${color}` }}>
                             <span>فريق {i+1}</span>
                             <span class="text-[10px] opacity-70">({count}/4 لاعبين)</span>
                          </button>
                        );
                     })}
                  </div>
                  <button onClick={joinAsPlayer} class="w-full p-4 bg-emerald-500 text-slate-950 font-black rounded-2xl text-xl shadow-xl shadow-emerald-500/10 hover:bg-emerald-400 transition-all">تأكيد حجز مكان بالمنصة 🚀</button>
                </div>
              </div>
            );
          }

          if (role === 'player' && joined) {
            const myTeamData = game?.teams?.[myTeam];
            const isBuzzedMe = game?.buzzedPlayerName === myName;
            return (
              <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center transition-all duration-300" style={{ backgroundColor: isBuzzedMe ? myTeamData?.color : '#0a0f18' }}>
                <div class="mb-6 bg-slate-900/80 p-3 px-6 rounded-full border border-slate-800 inline-block text-sm">
                   المتسابق: <span class="font-bold text-amber-400">{myName}</span> | <span style={{ color: myTeamData?.color }} class="font-black">{myTeamData?.name}</span>
                </div>

                {/* عرض النقاط الحية للمتسابق بجواله ليعرف مركزه مباشرة */}
                <div class="grid grid-cols-2 gap-4 max-w-sm w-full mb-6 text-xs bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 mx-auto">
                   <div class="text-right">نقاط فريقك الحالية: <span class="font-bold text-emerald-400 text-sm">{myTeamData?.score}</span></div>
                   <div class="text-left font-mono">الجولة الحالية: <span class="text-amber-400 font-bold text-sm">{game?.round || 1}</span></div>
                </div>
                
                {game?.currentQuestion ? (
                  <div class="w-full max-w-md space-y-8">
                    <div class="bg-slate-900/90 p-5 rounded-2xl border border-slate-800 shadow-xl">
                      <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">الموضوع: {game.currentQuestion.category}</p>
                      <p class="font-black text-xl text-white leading-relaxed">{game.currentQuestion.text}</p>
                    </div>
                    
                    <button onClick={triggerBuzzer} disabled={game.buzzedTeamId !== null} class={`w-72 h-72 rounded-full font-black text-3xl shadow-2xl border-[12px] transition-all flex flex-col items-center justify-center mx-auto cursor-pointer ${game.buzzedTeamId !== null ? 'bg-slate-800 border-slate-700 text-slate-500 scale-95 shadow-none' : 'bg-red-600 border-red-500 hover:bg-red-500 active:scale-90 text-white animate-pulse'}`}>
                      <span>{game.buzzedTeamId !== null ? 'مَقْفُول' : 'اِكْبِسْ! 🚨'}</span>
                      {game.buzzedTeamId !== null && <span class="text-xs font-normal mt-2 text-slate-400">الحاجز: {game.buzzedPlayerName}</span>}
                    </button>
                  </div>
                ) : (
                  <div class="bg-slate-900/40 p-8 rounded-2xl border border-slate-800/60 max-w-xs mx-auto animate-pulse">
                     <p class="text-slate-400 font-medium text-base">بانتظار أن يطلق مقدم اللعبة السؤال التالي للمجلس...☕</p>
                  </div>
                )}
              </div>
            );
          }

          return (
            <div class="p-3 md:p-6 max-w-7xl mx-auto">
              {/* الرأس الشامل للمعلومات والمزامنة الكاملة */}
              <div class="bg-slate-900 p-4 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-4 mb-6 border border-slate-800 shadow-xl">
                 <div class="text-lg font-semibold">غرفة المجلس الحالي: <span class="font-mono font-black text-amber-400 text-2xl tracking-wider">{roomCode}</span></div>
                 
                 {/* لوحة نتائج الفرق الـ 8 الكاملة والمحدثة حياً للشاشة الكبيرة والمقدم */}
                 <div class="flex flex-wrap gap-2 justify-center max-w-3xl">
                    {game?.teams?.map((t) => {
                       const hasPlayers = (game?.players || []).some(p => p.teamId === t.id);
                       if (!hasPlayers && role === 'display') return null; // لا تظهر الفرق الفارغة في شاشة العرض لجمالية الواجهة
                       return (
                          <div key={t.id} class="p-2 px-3 bg-slate-950/80 rounded-xl border border-slate-800 flex items-center gap-2 text-xs transition-all" style={{ borderRight: `4px solid ${t.color}` }}>
                             <span class="font-bold text-white/90">{t.name}:</span>
                             <span class="font-mono font-black text-emerald-400 text-sm">{t.score}ن</span>
                          </div>
                       );
                    })}
                 </div>

                 <div class="flex items-center gap-3">
                    <span class="bg-slate-950 text-amber-400 font-mono font-black px-4 py-1.5 rounded-xl border border-slate-800 text-sm">الجولة {game?.round || 1}</span>
                    <span class="p-1.5 px-4 bg-slate-950 rounded-xl text-xs text-cyan-400 font-bold border border-slate-800">{role === 'host' ? '🎙️ لوحة المقدم الكاملة' : '🖥️ شاشة العرض رئيسية'}</span>
                 </div>
              </div>

              {game?.phase === 'lobby' ? (
                 <div class="bg-slate-900 p-8 rounded-3xl text-center border border-slate-800 shadow-2xl max-w-2xl mx-auto">
                    <h2 class="text-3xl font-black mb-2 text-white">قاعة انتظار المتسابقين وتجهيز المجالس</h2>
                    <p class="mb-6 text-sm text-slate-400">يجب على كل فريق مشارك انضمام لاعب واحد كحد أدنى (4 كحد أقصى لكل فريق)</p>
                    
                    <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 mb-6 text-right space-y-2">
                       <p class="text-xs text-slate-500 font-bold">قائمة المتصلين حالياً بالداخل ومجموعاتهم:</p>
                       {(game?.players || []).length === 0 ? (
                          <p class="text-center text-slate-500 text-xs py-4">بانتظار دخول أول متسابق بجواله...</p>
                       ) : (
                          <div class="grid grid-cols-2 md:grid-cols-3 gap-2">
                             {game.players.map((p, idx) => (
                                <div key={idx} class="p-2 bg-slate-900 rounded-lg text-xs font-bold border border-slate-800 flex items-center justify-between">
                                   <span>{p.name}</span>
                                   <span style={{ color: TEAM_COLORS[p.teamId] }}>فريق {p.teamId+1}</span>
                                </div>
                             ))}
                          </div>
                       )}
                    </div>

                    {role === 'host' && (
                       <button onClick={() => set(ref(db, `rooms/${roomCode}/phase`), 'playing')} disabled={!canStartGame()} class={`w-full p-4 font-black rounded-xl text-xl shadow-xl transition-all ${canStartGame() ? 'bg-emerald-500 text-slate-950 hover:bg-emerald-400 cursor-pointer' : 'bg-slate-800 text-slate-500 cursor-not-allowed'}`}>إغلاق اللوبي وبدء التنافس الفعلي 🚀</button>
                    )}
                 </div>
              ) : (
                 <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    {/* اللوحة الرئيسية للأسئلة والإجابات الشجرية المزامنة */}
                    <div class="lg:col-span-2 space-y-6">
                       <div class="bg-slate-900 p-6 md:p-8 rounded-3xl border border-slate-800 shadow-2xl relative">
                          {game?.currentQuestion ? (
                             <div class="text-center">
                                <span class="bg-amber-400/10 text-amber-400 text-xs font-black px-4 py-1.5 rounded-full border border-amber-400/20">{game.currentQuestion.category}</span>
                                <h2 class="text-2xl md:text-4xl font-black my-6 text-white leading-relaxed tracking-wide">{game.currentQuestion.text}</h2>
                                
                                {/* بنك تجميع نقاط الإجابات المكتشفة حياً */}
                                <div class="bg-slate-950 p-4 px-10 rounded-2xl border border-slate-800 inline-block mb-6 shadow-inner">
                                   <div class="text-[10px] text-slate-500 uppercase font-bold tracking-wider mb-0.5">نقاط الإجابات النشطة الحالية</div>
                                   <div class="text-4xl font-mono font-black text-emerald-400">+{game.roundPoints || 0}</div>
                                </div>

                                {/* الأخطاء الثلاثة للجولة بالتأثير البصري الكامل */}
                                <div class="flex justify-center gap-4 mb-8">
                                   {[1, 2, 3].map((num) => (
                                      <div key={num} class={`w-14 h-14 rounded-2xl flex items-center justify-center font-black text-3xl border-2 transition-all duration-300 ${game.errors >= num ? 'bg-red-600/20 border-red-500 text-red-500 scale-110 shadow-lg shadow-red-500/20' : 'bg-slate-950 border-slate-800 text-slate-800'}`}>❌</div>
                                   ))}
                                </div>

                                {/* الإجابات الخمسة المخفية للشاشة والمكشوفة للمقدم والمكتشفة بالتنقيط التلقائي */}
                                <div class="space-y-3 max-w-2xl mx-auto text-right">
                                   {game.currentQuestion.answers.map((ans, idx) => (
                                      <div key={idx} onClick={() => role === 'host' && revealAnswer(idx)} class={`p-4 rounded-xl border-2 flex justify-between items-center transition-all duration-200 ${ans.revealed ? 'bg-blue-950/40 border-blue-500 text-white font-black' : role === 'host' ? 'bg-slate-950 border-slate-800 text-slate-400 cursor-pointer hover:border-slate-600' : 'bg-slate-950 border-slate-900 text-transparent select-none'}`}>
                                         <div class="flex items-center gap-4">
                                            <span class="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center text-sm font-mono font-bold text-slate-400 border border-slate-800">{idx + 1}</span>
                                            <span class={`text-sm md:text-base ${ans.revealed || role === 'host' ? 'text-white' : 'hidden'}`}>{ans.text}</span>
                                         </div>
                                         <span class={`font-mono font-black text-amber-400 text-lg ${ans.revealed || role === 'host' ? 'visible' : 'hidden'}`}>+{ans.points}</span>
                                      </div>
                                   ))}
                                </div>
                             </div>
                          ) : (
                             <div class="text-center py-20 text-slate-500 text-lg font-medium animate-pulse">بانتظار أن يختار مقدم اللعبة تصنيف الجولة من لوحة التحكم...🎙️</div>
                          )}
                       </div>
                    </div>

                    {/* لوحة التحكم الجانبية الحصرية للمقدم ومراقبة سرعة كبس البازر */}
                    <div class="space-y-6">
                       {/* حالة كبس الأزرار اللحظية (Buzzer Monitor) */}
                       <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 text-center shadow-xl">
                          <h3 class="font-bold text-slate-400 mb-4 text-xs uppercase tracking-wider">حالة كبّاسات المتسابقين اللحظية</h3>
                          {game?.buzzedTeamId !== null ? (
                             <div class="p-4 rounded-xl text-white font-black text-lg shadow-lg border" style={{ backgroundColor: TEAM_COLORS[game.buzzedTeamId], borderColor: TEAM_COLORS[game.buzzedTeamId] }}>
                                <div class="text-[10px] bg-black/20 inline-block px-2 py-0.5 rounded mb-1 text-white/80 font-normal">أسرع كبسة معتمدة</div>
                                <div class="truncate">🚨 {game?.buzzedPlayerName}</div>
                                <div class="text-xs font-normal mt-1 text-white/90">(فريق {game.buzzedTeamId + 1}) | الدور له تلقائياً</div>
                             </div>
                          ) : (
                             <div class="p-5 bg-slate-950 rounded-xl text-slate-500 border border-slate-850 text-xs font-medium leading-relaxed">💡 كبّاسات المتسابقين بجميع الأجهزة جاهزة ومنتظرة إطلاق السؤال لتلقي الإشارات والفرز المباشر...</div>
                          )}
                          
                          {role === 'host' && game?.buzzedTeamId !== null && (
                             <button onClick={clearBuzzer} class="mt-4 w-full p-2.5 bg-slate-800 hover:bg-slate-700 rounded-xl text-xs font-black text-white border border-slate-750 transition-all cursor-pointer">🔄 فتح وقفل البازر مجدداً (تصفير الكبس الحالي)</button>
                          )}
                       </div>

                       {/* لوحة العمليات الخاصة بمقدم اللعبة فقط (تختفي في شاشة المجلس الكبرى) */}
                       {role === 'host' && (
                          <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 space-y-4 shadow-xl">
                             <h3 class="font-black text-amber-400 border-b border-slate-800 pb-3 text-xs uppercase tracking-wider">🎮 وحدة إدارة التنقيط الشاملة</h3>
                             
                             {!game?.currentQuestion ? (
                                <div class="space-y-3">
                                   <p class="text-xs text-slate-400 font-bold">اختر تصنيف الجولة الحالية وسيقوم البنك بالسحب العشوائي الموزع:</p>
                                   <div class="grid grid-cols-2 gap-2">
                                      {CATEGORIES.map(cat => (
                                         <button key={cat} onClick={() => selectQuestion(cat)} class="p-3 bg-slate-950 border border-slate-800 rounded-xl hover:bg-slate-800 hover:border-slate-600 transition-all font-bold text-xs text-center text-white cursor-pointer">{cat}</button>
                                      ))}
                                   </div>
                                </div>
                             ) : (
                                <div class="space-y-4">
                                   {/* زر احتساب الخطأ التلقائي للفريق الكابس الممسك بالدور حالياً */}
                                   <button onClick={addError} class="w-full p-4 bg-red-600/20 hover:bg-red-600/30 border-2 border-red-500 text-red-400 font-black rounded-xl text-xs transition-all flex items-center justify-center gap-2 cursor-pointer shadow-lg shadow-red-600/5">❌ احتساب خطأ (❌) على الفريق الكابس الحالي</button>
                                   
                                   <div class="border-t border-slate-800 pt-4 space-y-2">
                                      <p class="text-xs text-slate-400 font-semibold mb-2">إغلاق الجولة والانتقال للجولة التالية:</p>
                                      <button onClick={nextRound} class="w-full p-4 bg-gradient-to-r from-amber-500 to-orange-500 text-slate-950 font-black rounded-xl text-sm shadow-xl shadow-orange-500/10 hover:brightness-110 transition-all cursor-pointer">⏭️ إنهاء الجولة الحالية وسحب السؤال القادم</button>
                                   </div>
                                </div>
                             )}
                          </div>
                       )}
                    </div>
                 </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        // هنا تضع الـ 200 سؤال (سأزودك بها في الرد القادم)
        const ALL_QUESTIONS = [
            { text: "وش أكثر شيء تطلبه إذا دخلت كافيه وما تبي قهوة سوداء؟", answers: [{text:'سبانش لاتيه', points:45}, {text:'آيس لاتيه', points:25}, {text:'فلات وايت', points:15}, {text:'كراميل ماكياتو', points:10}, {text:'موكا', points:5}] }
        ];

        function App() {
            const [currentQIndex, setCurrentQIndex] = React.useState(0);
            const [buzzerLocked, setBuzzerLocked] = React.useState(false);
            const [errors, setErrors] = React.useState(0);
            const [revealed, setRevealed] = React.useState({});
            
            const question = ALL_QUESTIONS[currentQIndex];

            const toggleAnswer = (idx) => {
                setRevealed(prev => ({ ...prev, [idx]: !prev[idx] }));
            };

            return (
                <div class="p-6">
                    <h1 class="text-amber-400 font-bold mb-6 text-center text-2xl">لوحة تحكم المقدم</h1>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        {/* لوحة التحكم والأسئلة */}
                        <div class="bg-slate-900 p-6 rounded-2xl">
                            <div class="flex justify-between items-center mb-4">
                                <h2 class="text-sm text-slate-400">التحكم في اللعبة</h2>
                                <button 
                                    onClick={() => setBuzzerLocked(!buzzerLocked)}
                                    class={`px-4 py-2 rounded-lg font-bold ${buzzerLocked ? 'bg-red-600' : 'bg-emerald-600'}`}>
                                    {buzzerLocked ? 'الكبس مقفل' : 'الكبس مفتوح'}
                                </button>
                            </div>

                            {/* عداد الأخطاء */}
                            <div class="flex gap-2 mb-6">
                                {[1,2,3].map(i => (
                                    <button key={i} onClick={() => setErrors(i)} class={`w-12 h-12 rounded-lg ${errors >= i ? 'bg-red-500' : 'bg-slate-700'}`}>X</button>
                                ))}
                            </div>

                            {/* الإجابات المكشوفة للمقدم */}
                            {question.answers.map((a, i) => (
                                <div key={i} onClick={() => toggleAnswer(i)} class={`flex justify-between p-3 mb-2 rounded cursor-pointer ${revealed[i] ? 'bg-blue-600' : 'bg-slate-800'}`}>
                                    <span>{a.text}</span>
                                    <span class="font-bold">{a.points}</span>
                                </div>
                            ))}
                        </div>

                        {/* شاشة العرض (المخفية عن المتسابقين) */}
                        <div class="bg-slate-900 p-6 rounded-2xl border-2 border-amber-500">
                            <p class="text-xs text-slate-400 mb-1">سألنا 100 شخص</p>
                            <h3 class="text-xl font-bold mb-6">{question.text}</h3>
                            <div class="space-y-3">
                                {question.answers.map((a, i) => (
                                    <div key={i} class="bg-slate-950 p-4 rounded-xl text-center border border-slate-700">
                                        {revealed[i] ? `${a.text} (${a.points})` : '؟؟؟'}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

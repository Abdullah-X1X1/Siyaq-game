<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const { useState, useEffect } = React;

        // تكوين الفايربيس الخاص بك
        const firebaseConfig = { databaseURL: "https://siyaq-rouyine-default-rtdb.firebaseio.com" };
        const db = getDatabase(initializeApp(firebaseConfig));

        function App() {
            const [role, setRole] = useState(null);
            const [room, setRoom] = useState('');
            const [teams, setTeams] = useState({
                team1: { name: 'الفريق الأول', score: 0, errors: 0 },
                team2: { name: 'الفريق الثاني', score: 0, errors: 0 }
            });
            const [activeTeam, setActiveTeam] = useState(null); // يقرأ من الفايربيس مباشرة
            const [buzzerOpen, setBuzzerOpen] = useState(true);

            // الاستماع للتغيرات في الفايربيس للغرفة المحددة
            useEffect(() => {
                if (!room) return;
                const roomRef = ref(db, `rooms/${room}`);
                
                const unsubscribe = onValue(roomRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        if (data.teams) setTeams(data.teams);
                        setActiveTeam(data.activeTeam || null);
                        setBuzzerOpen(data.buzzerOpen !== false);
                    }
                });
                return () => unsubscribe();
            }, [room]);

            // إضافة خطأ للفريق الكابس حالياً عبر الفايربيس
            const handleAddError = () => {
                if (activeTeam && room) {
                    const currentErrors = teams[activeTeam].errors;
                    const updates = {};
                    // زيادة الخطأ وبحد أقصى 3، وتصفير الكبس تلقائياً بعد الخطأ
                    updates[`rooms/${room}/teams/${activeTeam}/errors`] = Math.min(currentErrors + 1, 3);
                    updates[`rooms/${room}/activeTeam`] = null; 
                    
                    update(ref(db), updates);
                    // تشغيل صوت الخطأ للمقدم
                    new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
                }
            };

            // التحكم في فتح وإغلاق الكبس للكل
            const toggleBuzzerStatus = () => {
                if (room) {
                    update(ref(db), { [`rooms/${room}/buzzerOpen`]: !buzzerOpen });
                }
            };

            if (!role) return (
                <div class="flex flex-col items-center justify-center h-screen gap-4">
                    <input class="p-4 rounded bg-slate-900 border border-slate-700 text-center" placeholder="أدخل رمز الغرفة" onChange={e => setRoom(e.target.value)}/>
                    <div class="flex gap-4">
                        <button class="bg-amber-500 p-4 rounded-xl font-bold w-32" onClick={() => setRole('host')}>مقدم</button>
                        <button class="bg-blue-600 p-4 rounded-xl font-bold w-32" onClick={() => setRole('display')}>شاشة عرض</button>
                    </div>
                </div>
            );

            return (
                <div class="p-6 h-screen flex flex-col justify-between">
                    <div>
                        <div class="text-center font-bold text-amber-400 mb-4">الغرفة الحالية: {room}</div>
                        
                        {/* عرض معلومات الفرق والأخطاء فوق الجدول */}
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class={`p-4 rounded-xl border-2 bg-slate-900 ${activeTeam === 'team1' ? 'border-amber-400 shadow-lg shadow-amber-500/20' : 'border-slate-700'}`}>
                                <h2 class="text-xl font-bold text-center">{teams.team1.name}</h2>
                                <div class="flex justify-around mt-2 text-sm text-slate-400">
                                    <span>الأخطاء: {teams.team1.errors}</span>
                                    <span>النقاط: {teams.team1.score}</span>
                                </div>
                            </div>
                            <div class={`p-4 rounded-xl border-2 bg-slate-900 ${activeTeam === 'team2' ? 'border-amber-400 shadow-lg shadow-amber-500/20' : 'border-slate-700'}`}>
                                <h2 class="text-xl font-bold text-center">{teams.team2.name}</h2>
                                <div class="flex justify-around mt-2 text-sm text-slate-400">
                                    <span>النقاط: {teams.team2.score}</span>
                                    <span>الأخطاء: {teams.team2.errors}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* أزرار التحكم السفلية للمقدم فقط */}
                    {role === 'host' && (
                        <div class="bg-slate-900 p-4 rounded-2xl flex justify-center items-center gap-6 border border-slate-800">
                            <button 
                                onClick={toggleBuzzerStatus} 
                                class={`px-6 py-3 rounded-xl font-bold ${buzzerOpen ? 'bg-emerald-600' : 'bg-red-600'}`}>
                                {buzzerOpen ? 'الكبس مفتوح للجميع' : 'الكبس مقفل'}
                            </button>
                            
                            <button 
                                onClick={handleAddError} 
                                disabled={!activeTeam}
                                class={`px-8 py-4 rounded-xl font-bold text-lg ${activeTeam ? 'bg-red-600 hover:bg-red-700 cursor-pointer' : 'bg-slate-800 text-slate-500 cursor-not-allowed'}`}>
                                تسجيل خطأ على الفريق الكابس
                            </button>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

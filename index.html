<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة سياق - النسخة A.5.6 التشخيصية</title>
    
    <!-- استدعاء المكتبات المستقرة -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- الفايربيز الكلاسيكي المضمون -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { background: radial-gradient(circle at center, #111A3A 0%, #070B19 100%); color: #FFFFFF; font-family: system-ui, -apple-system, sans-serif; }
        .panel-bg { background-color: #121B3D; border: 1px solid #1E2E69; }
        .board-bg { background-color: #0D1430; border: 1px solid #1E2E69; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen select-none">
    
    <!-- الحاوية الرئيسية للعبة -->
    <div id="root"></div>

    <!-- كود اللعبة البرمجي المحمي -->
    <script type="text/babel">
        let db = null;
        let bootError = null;

        // فحص آمن لتحميل الفايربيز قبل تشغيل التطبيق
        try {
            if (typeof firebase !== 'undefined') {
                const firebaseConfig = { databaseURL: "https://siyaq-rouyine-default-rtdb.firebaseio.com" };
                if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
                db = firebase.database();
            } else {
                bootError = "فشل تحميل ملفات الفايربيز من الـ CDN. تحقق من اتصال الإنترنت أو قيود الحجب.";
            }
        } catch (e) {
            bootError = "خطأ في تهيئة قاعدة البيانات: " + e.message;
        }

        const TEAM_COLORS = {
            team1: { name: "الفريق الأحمر", hex: "#EF4444" }, team2: { name: "الفريق الأزرق", hex: "#3B82F6" },
            team3: { name: "الفريق الأخضر", hex: "#10B981" }, team4: { name: "الفريق البنفسجي", hex: "#8B5CF6" },
            team5: { name: "الفريق البرتقالي", hex: "#F97316" }, team6: { name: "الفريق السماوي", hex: "#06B6D4" },
            team7: { name: "الفريق الوردي", hex: "#EC4899" }, team8: { name: "الفريق الأصفر", hex: "#EAB308" }
        };

        const CURATED_ROUNDS = [
            {
                category: "الحياة اليومية",
                question: "وش أول شيء تسويه أول ما تفتح عينك وتصحى من النوم؟",
                answers: [
                    { text: "أقعد أدور الجوال تحت المخدرة", points: 52 },
                    { text: "أطفي المنبه وأرجع أنام خمس دقايق", points: 26 },
                    { text: "أتثاوب وأتمغط بالفراش", points: 13 },
                    { text: "أروح أركض للحمام وأتوضأ", points: 9 }
                ]
            }
        ];

        function App() {
            const [role, setRole] = React.useState(null);
            const [room, setRoom] = React.useState('');
            const [gameState, setGameState] = React.useState({
                currentCategory: "", activeTeam: "", buzzerOpen: true, revealed: {}, roundActive: false, questionText: "", currentAnswers: [], buzzerQueue: [], teams: {}
            });

            React.useEffect(() => {
                if (!room || !db) return;
                const roomRef = db.ref(`rooms/${room}`);
                const handleData = (snapshot) => {
                    const data = snapshot.val();
                    if (data) setGameState(data);
                };
                roomRef.on('value', handleData);
                return () => roomRef.off('value', handleData);
            }, [room]);

            // شاشة عرض الخطأ الداخلي إن وجد
            if (bootError) {
                return (
                    <div className="flex items-center justify-center min-h-screen p-4 text-center max-w-md mx-auto">
                        <div className="bg-red-950/80 border border-red-500 rounded-2xl p-6 shadow-2xl">
                            <h2 className="text-xl font-black text-red-400 mb-2">⚠️ تعذر تشغيل النظام الداخلي</h2>
                            <p className="text-xs text-slate-300 font-mono bg-black/30 p-3 rounded-xl text-right overflow-x-auto">{bootError}</p>
                        </div>
                    </div>
                );
            }

            if (!role) return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4 max-w-md mx-auto animate-fadeIn">
                    <div className="text-center mb-6">
                        <h1 className="text-6xl font-black text-[#F2C94C] tracking-wide">سياق</h1>
                        <p className="text-blue-400 font-bold text-sm mt-1">النسخة المستقرة A.5.6</p>
                    </div>
                    <div className="bg-[#1B2344]/80 border border-[#2B3A6F] rounded-[28px] p-6 w-full flex flex-col gap-3 shadow-2xl backdrop-blur-md">
                        <input className="bg-[#2D1F55] border border-[#443182] rounded-2xl text-center font-bold text-lg h-14 w-full text-white outline-none" 
                               placeholder="أدخل رمز الغرفة" value={room} onChange={e => setRoom(e.target.value.toUpperCase())} />
                        <button disabled={!room} onClick={() => setRole('host')} className="bg-[#E28743] hover:bg-[#CD7432] font-extrabold text-white h-14 rounded-2xl transition-all active:scale-95 shadow-md">دخول كمقدم اللعبة</button>
                        <button disabled={!room} onClick={() => setRole('display')} className="bg-[#2F80ED] hover:bg-[#1B66D1] font-extrabold text-white h-14 rounded-2xl transition-all active:scale-95 shadow-md">شاشة العرض الكبرى</button>
                    </div>
                </div>
            );

            return <div className="p-6 text-center font-bold">تم تسجيل الدخول بنجاح كـ {role}</div>;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <!-- 🚨 كاشف الأعطال التلقائي (Watchdog) 🚨 -->
    <script>
        setTimeout(() => {
            const rootEl = document.getElementById('root');
            if (!rootEl || rootEl.innerHTML.trim() === "") {
                rootEl.innerHTML = `
                    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: screen; height: 100vh; padding: 24px; text-align: center; font-family: sans-serif;" class="animate-fadeIn">
                        <div style="background-color: rgba(69, 10, 10, 0.9); border: 1px solid #ef4444; border-radius: 16px; padding: 24px; max-width: 450px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);">
                            <h2 style="color: #f87171; font-weight: 900; font-size: 20px; margin-bottom: 12px;">⚠️ تنبيه: المتصفح حجب تشغيل اللعبة</h2>
                            <p style="color: #cbd5e1; font-size: 13px; line-height: 1.6; margin-bottom: 16px;">
                                المتصفح لم يستطع معالجة الأكواد. هذا يعني أن هناك نقصاً أثناء نسخ الكود، أو أن شبكة الإنترنت لديك تحجب روابط مكتبات تشغيل واجهات (React / Babel).
                            </p>
                            <div style="background-color: rgba(0,0,0,0.4); padding: 12px; border-radius: 8px; text-align: right; font-size: 11px; font-family: monospace; color: #fca5a5; margin-bottom: 16px; direction: ltr; overflow-x: auto;">
                                👉 Try pressing F12 -> Check 'Console' tab to see the exact red error.
                            </div>
                            <button onclick="window.location.reload()" style="background-color: #dc2626; color: white; font-weight: bold; padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer;">إعادة تحديث الصفحة</button>
                        </div>
                    </div>
                `;
            }
        }, 2000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        const { useState } = React;

        function App() {
            const [role, setRole] = useState(null);
            // إعدادات الفرق الافتراضية
            const [teams, setTeams] = useState([
                { name: 'الفريق الأول', score: 0, errors: 0 },
                { name: 'الفريق الثاني', score: 0, errors: 0 }
            ]);
            const [lastBuzzer, setLastBuzzer] = useState(null); // مين اللي كبس آخر مرة؟

            // إضافة خطأ للفريق اللي كبس آخر مرة
            const addErrorToLastBuzzer = () => {
                if (lastBuzzer !== null) {
                    setTeams(prev => prev.map((t, i) => 
                        i === lastBuzzer ? { ...t, errors: Math.min(t.errors + 1, 3) } : t
                    ));
                    // هنا يمكننا إضافة كود تشغيل صوت "خطأ"
                    new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
                }
            };

            if (!role) return (
                <div class="flex flex-col items-center justify-center h-screen gap-4">
                    <button class="bg-amber-500 p-6 rounded-2xl w-64" onClick={() => setRole('host')}>دخول كمقدم</button>
                    <button class="bg-blue-600 p-6 rounded-2xl w-64" onClick={() => setRole('display')}>دخول كشاشة عرض</button>
                </div>
            );

            return (
                <div class="p-4">
                    {/* عرض الفرق (اسم الفريق + الأخطاء + النقاط) */}
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        {teams.map((team, idx) => (
                            <div key={idx} class="bg-slate-900 p-4 rounded-xl border border-slate-700 text-center">
                                <h2 class="text-xl font-bold text-amber-400">{team.name}</h2>
                                <div class="flex justify-around mt-2 text-sm">
                                    <span>الأخطاء: {team.errors}</span>
                                    <span>النقاط: {team.score}</span>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* لوحة تحكم المقدم */}
                    {role === 'host' && (
                        <div class="fixed bottom-0 left-0 right-0 p-4 bg-slate-900 flex justify-center gap-4">
                            <button onClick={addErrorToLastBuzzer} class="bg-red-600 px-8 py-4 rounded-full font-bold">تسجيل خطأ على الفريق الكابس</button>
                            <button onClick={() => setLastBuzzer(0)} class="bg-blue-700 px-6 py-2 rounded">كبس الفريق 1</button>
                            <button onClick={() => setLastBuzzer(1)} class="bg-blue-700 px-6 py-2 rounded">كبس الفريق 2</button>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

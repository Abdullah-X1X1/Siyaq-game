<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        const { useState } = React;

        function App() {
            const [role, setRole] = useState(null);
            const [room, setRoom] = useState('');
            const [buzzerOpen, setBuzzerOpen] = useState(true);
            // عدادات أخطاء منفصلة لكل فريق
            const [errors, setErrors] = useState({ team1: 0, team2: 0 });

            const handleAddError = (team) => setErrors(prev => ({ ...prev, [team]: Math.min(prev[team] + 1, 3) }));
            const handleRemoveError = (team) => setErrors(prev => ({ ...prev, [team]: Math.max(prev[team] - 1, 0) }));

            if (!role) return (
                <div class="flex flex-col items-center justify-center h-screen">
                    <input class="p-4 mb-4 rounded text-black" placeholder="رمز الغرفة" onChange={e => setRoom(e.target.value)}/>
                    <div class="flex gap-2">
                        <button class="bg-amber-500 p-4 rounded" onClick={() => setRole('host')}>مقدم</button>
                        <button class="bg-blue-600 p-4 rounded" onClick={() => setRole('display')}>عرض</button>
                    </div>
                </div>
            );

            return (
                <div class="h-screen flex flex-col">
                    <div class="p-4 text-center font-bold text-amber-400">الغرفة: {room}</div>
                    
                    <div class="flex-grow grid grid-cols-2 gap-4 p-4">
                        <div class="bg-slate-900 border border-slate-700 rounded-xl p-4">الإجابات</div>
                        <div class="bg-slate-900 border border-amber-500 rounded-xl p-4">شاشة العرض</div>
                    </div>

                    {/* شريط التحكم السفلي للمقدم */}
                    {role === 'host' && (
                        <div class="bg-slate-800 p-4 flex justify-center items-center gap-8 border-t border-slate-700">
                            {/* فريق 1 */}
                            <div class="flex items-center gap-2">
                                <span>فريق 1: {errors.team1}</span>
                                <button onClick={() => handleAddError('team1')} class="bg-red-600 px-3 py-1 rounded">+</button>
                                <button onClick={() => handleRemoveError('team1')} class="bg-slate-600 px-3 py-1 rounded">-</button>
                            </div>

                            {/* زر الكبس المركزي */}
                            <button onClick={() => setBuzzerOpen(!buzzerOpen)} class={`px-8 py-3 rounded-full font-bold ${buzzerOpen ? 'bg-emerald-600' : 'bg-red-600'}`}>
                                {buzzerOpen ? 'الكبس مفتوح' : 'الكبس مقفل'}
                            </button>

                            {/* فريق 2 */}
                            <div class="flex items-center gap-2">
                                <button onClick={() => handleRemoveError('team2')} class="bg-slate-600 px-3 py-1 rounded">-</button>
                                <button onClick={() => handleAddError('team2')} class="bg-red-600 px-3 py-1 rounded">+</button>
                                <span>{errors.team2} :فريق 2</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

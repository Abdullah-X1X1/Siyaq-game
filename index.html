<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة سياق - النسخة الفولاذية المضمونة A.6.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { 
            background: radial-gradient(circle at center, #111A3A 0%, #070B19 100%); 
            color: #FFFFFF; 
            font-family: system-ui, -apple-system, sans-serif; 
        }
        .panel-bg { background-color: #121B3D; border: 1px solid #1E2E69; }
        .board-bg { background-color: #0D1430; border: 1px solid #1E2E69; }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen select-none">

    <div id="login-screen" class="flex flex-col items-center justify-center min-h-screen p-4 max-w-md mx-auto animate-fadeIn">
        <div class="text-center mb-6">
            <h1 class="text-6xl font-black text-[#F2C94C] tracking-wide">سياق</h1>
            <p class="text-emerald-400 font-bold text-sm mt-1">النسخة الفولاذية المضمونة A.6.0</p>
        </div>
        <div class="bg-[#1B2344]/80 border border-[#2B3A6F] rounded-[28px] p-6 w-full flex flex-col gap-3 shadow-2xl backdrop-blur-md">
            <input id="room-input" type="text" class="bg-[#2D1F55] border border-[#443182] rounded-2xl text-center font-bold text-lg h-14 w-full text-white outline-none placeholder-gray-500 uppercase" placeholder="أدخل رمز الغرفة">
            <button id="btn-host" class="bg-[#E28743] hover:bg-[#CD7432] font-extrabold text-white h-14 rounded-2xl transition-all active:scale-95 shadow-md">دخول كمقدم اللعبة</button>
            <button id="btn-display" class="bg-[#2F80ED] hover:bg-[#1B66D1] font-extrabold text-white h-14 rounded-2xl transition-all active:scale-95 shadow-md">شاشة العرض الكبرى</button>
        </div>
        <div id="boot-error" class="hidden mt-4 bg-red-950/80 border border-red-500 rounded-xl p-4 text-sm text-red-300 w-full text-center"></div>
    </div>

    <div id="game-screen" class="hidden min-h-screen p-4 animate-fadeIn">
        </div>

    <script>
        let db = null;
        let currentRoom = "";
        let currentRole = "";
        let gameState = {};

        // تهيئة الفايربيز الآمنة بدون اعتمادات معقدة
        try {
            if (typeof firebase !== 'undefined') {
                const firebaseConfig = { databaseURL: "https://siyaq-rouyine-default-rtdb.firebaseio.com" };
                if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
                db = firebase.database();
            } else {
                showBootError("تعذر الاتصال بخوادم الفايربيز الأساسية. يرجى التحقق من اتصال الإنترنت.");
            }
        } catch (e) {
            showBootError("خطأ في النظام الداخلي: " + e.message);
        }

        function showBootError(msg) {
            const errDiv = document.getElementById("boot-error");
            errDiv.innerText = msg;
            errDiv.classList.remove("hidden");
        }

        // الاستماع لأزرار واجهة الدخول
        document.getElementById("btn-host").addEventListener("click", () => handleLogin("host"));
        document.getElementById("btn-display").addEventListener("click", () => handleLogin("display"));

        function handleLogin(role) {
            const roomInput = document.getElementById("room-input").value.trim().toUpperCase();
            if (!roomInput) {
                alert("الرجاء إدخال رمز الغرفة أولاً");
                return;
            }
            if (!db) {
                alert("النظام غير متصل بقاعدة البيانات حالياً.");
                return;
            }

            currentRoom = roomInput;
            currentRole = role;

            // إخفاء شاشة الدخول وإظهار شاشة اللعبة
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("game-screen").classList.remove("hidden");

            // بدء الاستماع الحي للتغيرات في الفايربيز
            db.ref(`rooms/${currentRoom}`).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    gameState = data;
                    renderGame();
                } else {
                    // إذا كانت الغرفة جديدة، نقوم بتهيئتها افتراضياً
                    initializeNewRoom();
                }
            });
        }

        function initializeNewRoom() {
            const defaultState = {
                currentCategory: "انتظار",
                questionText: "بانتظار اختيار تصنيف الجولة من لوحة التحكم",
                activeTeam: "",
                buzzerOpen: true,
                roundActive: false,
                currentAnswers: [],
                revealed: {},
                teams: {
                    team1: { name: "الفريق الأحمر", score: 0 },
                    team2: { name: "الفريق الأزرق", score: 0 }
                }
            };
            db.ref(`rooms/${currentRoom}`).set(defaultState);
        }

        // دالة الرسم الأساسية (Render) المعتمدة على الـ DOM النقي
        function renderGame() {
            const gameScreen = document.getElementById("game-screen");
            
            if (currentRole === "host") {
                // تصميم واجهة مقدم اللعبة
                gameScreen.innerHTML = `
                    <div class="max-w-5xl mx-auto flex flex-col gap-4">
                        <div class="panel-bg rounded-2xl p-4 flex justify-between items-center shadow-md">
                            <span class="text-yellow-400 font-black text-xl">لوحة التحكم والمراقبة</span>
                            <span class="bg-blue-900/50 px-4 py-1 rounded-full text-xs border border-blue-700">الغرفة: ${currentRoom}</span>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div class="flex flex-col gap-3">
                                <div class="panel-bg rounded-2xl p-4 flex flex-col gap-2">
                                    <h3 class="text-sm font-bold text-gray-400 mb-1">لوحة التحكم الذكية</h3>
                                    <button onclick="triggerAction('toggleBuzzer')" class="w-full py-3 rounded-xl font-bold transition-all ${gameState.buzzerOpen ? 'bg-red-600 hover:bg-red-700' : 'bg-green-600 hover:bg-green-700'} text-white">
                                        ${gameState.buzzerOpen ? '🔴 قفل الكابس اللحظي' : '🟢 فتح الكابس للمتسابقين'}
                                    </button>
                                    <button onclick="triggerAction('resetBuzzer')" class="w-full bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl font-bold transition-all">🔄 تصفير وإعادة تفعيل الجولة</button>
                                </div>
                                
                                <div class="panel-bg rounded-2xl p-4 flex flex-col gap-2">
                                    <h3 class="text-sm font-bold text-gray-400 mb-1">إضافة وإدارة النقاط</h3>
                                    <button onclick="addPoints('team1', 10)" class="w-full bg-red-600/20 hover:bg-red-600/40 text-red-300 border border-red-700 py-2 rounded-xl text-xs font-bold transition-all">+10 نقاط للأحمر</button>
                                    <button onclick="addPoints('team2', 10)" class="w-full bg-blue-600/20 hover:bg-blue-600/40 text-blue-300 border border-blue-700 py-2 rounded-xl text-xs font-bold transition-all">+10 نقاط للأزرق</button>
                                </div>
                            </div>

                            <div class="md:col-span-2 board-bg rounded-3xl p-6 shadow-xl flex flex-col gap-4">
                                <div class="text-center">
                                    <span class="bg-[#E28743] text-white text-xs px-3 py-1 rounded-full font-bold">${gameState.currentCategory || 'عام'}</span>
                                    <h2 class="text-xl font-black mt-2 text-gray-100">${gameState.questionText}</h2>
                                </div>

                                <div class="flex flex-col gap-2 mt-2">
                                    ${renderHostAnswers()}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                // تصميم واجهة شاشة العرض الكبرى
                gameScreen.innerHTML = `
                    <div class="max-w-6xl mx-auto flex flex-col gap-6 pt-6">
                        <div class="flex justify-center gap-8">
                            <div class="bg-red-600/20 border border-red-500 rounded-2xl px-6 py-3 text-center min-w-[140px] shadow-lg">
                                <div class="text-xs text-red-300 font-bold">الفريق الأحمر</div>
                                <div class="text-3xl font-black mt-1 text-white">${gameState.teams?.team1?.score || 0} ن</div>
                            </div>
                            <div class="bg-blue-600/20 border border-blue-500 rounded-2xl px-6 py-3 text-center min-w-[140px] shadow-lg">
                                <div class="text-xs text-blue-300 font-bold">الفريق الأزرق</div>
                                <div class="text-3xl font-black mt-1 text-white">${gameState.teams?.team2?.score || 0} ن</div>
                            </div>
                        </div>

                        <div class="board-bg rounded-[36px] p-8 max-w-4xl w-full mx-auto shadow-2xl border border-blue-900/60 flex flex-col gap-6 text-center">
                            <div>
                                <span class="bg-yellow-500 text-black text-xs font-black px-4 py-1 rounded-full uppercase tracking-widest">${gameState.currentCategory || 'سياق'}</span>
                                <h2 class="text-2xl md:text-3xl font-black mt-4 leading-relaxed text-white">${gameState.questionText}</h2>
                            </div>

                            <div class="grid grid-cols-1 gap-3 mt-4 max-w-2xl mx-auto w-full">
                                ${renderDisplayAnswers()}
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        // مساعد رندر الإجابات للمقدم للتحكم في الكشف
        function renderHostAnswers() {
            if (!gameState.currentAnswers || gameState.currentAnswers.length === 0) {
                return `<p class="text-gray-500 text-sm py-4">لا توجد إجابات محملة حالياً في هذه الجولة.</p>`;
            }
            return gameState.currentAnswers.map((ans, idx) => {
                const isRevealed = gameState.revealed && gameState.revealed[idx];
                return `
                    <div class="flex justify-between items-center p-3 rounded-xl border ${isRevealed ? 'bg-emerald-950/40 border-emerald-500 text-emerald-200' : 'bg-slate-900/60 border-slate-700 text-slate-400'}">
                        <span class="text-sm font-bold">${idx + 1}. ${ans.text} (${ans.points} ن)</span>
                        <button onclick="toggleAnswerReveal(${idx})" class="text-xs px-3 py-1 rounded-lg font-black transition-all ${isRevealed ? 'bg-red-900/60 text-red-200 hover:bg-red-900' : 'bg-emerald-600 text-white hover:bg-emerald-500'}">
                            ${isRevealed ? 'إخفاء 👁️' : 'كشف 🔓'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        // مساعد رندر الإجابات لشاشة العرض الكبرى (مخفية بالنقاط أو مكشوفة بالكامل)
        function renderDisplayAnswers() {
            if (!gameState.currentAnswers || gameState.currentAnswers.length === 0) {
                return `<div class="text-slate-600 font-medium py-6">بانتظار بدء الجولة...</div>`;
            }
            return gameState.currentAnswers.map((ans, idx) => {
                const isRevealed = gameState.revealed && gameState.revealed[idx];
                if (isRevealed) {
                    return `
                        <div class="flex justify-between items-center h-14 px-6 bg-gradient-to-r from-emerald-600 to-teal-600 rounded-xl border border-emerald-400/30 text-white font-black text-lg shadow-md animate-fadeIn">
                            <span>${ans.text}</span>
                            <span class="bg-black/20 px-3 py-0.5 rounded-md">${ans.points}+</span>
                        </div>
                    `;
                } else {
                    return `
                        <div class="flex justify-between items-center h-14 px-6 bg-[#131B3E] border border-[#23316B] rounded-xl text-slate-500 font-bold text-lg">
                            <span>••••••••••••••••••••••••</span>
                            <span class="bg-slate-900/40 px-3 py-0.5 rounded-md text-sm text-slate-600">؟</span>
                        </div>
                    `;
                }
            }).join('');
        }

        // وظائف التحكم والأكشن التفاعلية
        function triggerAction(actionType) {
            if (actionType === 'toggleBuzzer') {
                db.ref(`rooms/${currentRoom}/buzzerOpen`).set(!gameState.buzzerOpen);
            } else if (actionType === 'resetBuzzer') {
                // إعادة تحميل جولة افتراضية مستقرة للتجربة الفورية
                const resetData = {
                    currentCategory: "السفر والسياحة",
                    questionText: "أهم غرض يحرص المسافر على التأكد منه قبل التوجه للمطار؟",
                    buzzerOpen: true,
                    revealed: {},
                    currentAnswers: [
                        { text: "جواز السفر وتأشيرة الدخول", points: 50 },
                        { text: "الجوال واللابتوب والشواحن", points: 22 },
                        { text: "النقود وبطاقات الائتمان", points: 16 },
                        { text: "تذاكر الطيران وحجز الفندق", points: 8 }
                    ]
                };
                db.ref(`rooms/${currentRoom}`).update(resetData);
            }
        }

        function toggleAnswerReveal(idx) {
            const currentStatus = gameState.revealed && gameState.revealed[idx];
            db.ref(`rooms/${currentRoom}/revealed/${idx}`).set(!currentStatus);
        }

        function addPoints(teamKey, amount) {
            const currentScore = gameState.teams && gameState.teams[teamKey] && gameState.teams[teamKey].score ? gameState.teams[teamKey].score : 0;
            db.ref(`rooms/${currentRoom}/teams/${teamKey}/score`).set(currentScore + amount);
        }
    </script>
</body>
</html>

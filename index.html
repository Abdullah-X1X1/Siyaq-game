<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        const { useState } = React;

        function App() {
            const [role, setRole] = useState(null);
            // نظام الفريق: كل فريق يعرف نفسه بالـ ID الخاص فيه
            const [teams, setTeams] = useState([
                { id: 0, name: 'الفريق الأول', score: 0, errors: 0 },
                { id: 1, name: 'الفريق الثاني', score: 0, errors: 0 }
            ]);
            
            // الفريق الذي كبس حالياً (يتم تحديده من أجهزة اللاعبين لاحقاً)
            const [activeTeamId, setActiveTeamId] = useState(null);

            const addError = () => {
                if (activeTeamId !== null) {
                    setTeams(prev => prev.map(t => 
                        t.id === activeTeamId ? { ...t, errors: Math.min(t.errors + 1, 3) } : t
                    ));
                    // هنا يتم تصفير الكبسة بعد تسجيل الخطأ
                    setActiveTeamId(null);
                }
            };

            // زر لتمثيل "كبسة الفريق" (هذا اللي بيجي من أجهزة اللاعبين مستقبلاً)
            const simulateBuzzer = (id) => setActiveTeamId(id);

            return (
                <div class="p-6">
                    {/* عرض الفرق (الاسم، الأخطاء، النقاط) */}
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        {teams.map(t => (
                            <div key={t.id} class={`p-4 rounded-xl border-2 ${activeTeamId === t.id ? 'border-amber-400 bg-slate-800' : 'border-slate-700 bg-slate-900'}`}>
                                <h2 class="text-xl font-bold">{t.name}</h2>
                                <p>الأخطاء: {t.errors}</p>
                                <p>النقاط: {t.score}</p>
                            </div>
                        ))}
                    </div>

                    {/* لوحة تحكم المقدم (فقط إضافة خطأ أو اختيار جواب) */}
                    <div class="fixed bottom-0 left-0 right-0 p-6 bg-slate-900 flex justify-center gap-4">
                        <button onClick={addError} class="bg-red-600 px-8 py-4 rounded-xl font-bold">إضافة خطأ على الفريق الكابس</button>
                        
                        {/* أزرار تجريبية للمحاكاة */}
                        <div class="flex gap-2 border-r pr-4">
                            <button onClick={() => simulateBuzzer(0)} class="bg-blue-600 px-4 py-2 rounded">محاكاة كبس فريق 1</button>
                            <button onClick={() => simulateBuzzer(1)} class="bg-blue-600 px-4 py-2 rounded">محاكاة كبس فريق 2</button>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

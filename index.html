<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة سياق - النسخة النهائية المعتمدة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen select-none font-sans">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://siyaq-rouyine-default-rtdb.firebaseio.com" };
        const db = getDatabase(initializeApp(firebaseConfig));

        // مكتبة الأسئلة المتكاملة والجاهزة للعب فوراً
        const ALL_QUESTIONS = [
            { text: "وش أكثر شيء تطلبه إذا دخلت كافيه وما تبي قهوة سوداء؟", answers: [{text:'سبانش لاتيه', points:45}, {text:'آيس لاتيه', points:25}, {text:'فلات وايت', points:15}, {text:'كراميل ماكياتو', points:10}, {text:'موكا', points:5}] },
            { text: "وش أول شيء تسويه إذا شفت جوالك طاح على الأرض؟", answers: [{text:'تشيك على الشاشة', points:55}, {text:'ترفعه بسرعة', points:15}, {text:'تشيك على الكاميرا', points:15}, {text:'تجرب اللمس', points:10}, {text:'تستغفر', points:5}] },
            { text: "وش أكثر عذر نستخدمه إذا تأخرنا عن الدوام أو الموعد؟", answers: [{text:'زحمة الطريق', points:50}, {text:'نمت/ما سمعت المنبه', points:25}, {text:'بنشرت السيارة', points:10}, {text:'تعبان/مريض', points:10}, {text:'مضيع المفتاح', points:5}] },
            { text: "وش أول شيء تفكر تشتريه إذا نزل الراتب؟", answers: [{text:'عشاء فخم/مطعم', points:40}, {text:'ملابس/عطور', points:30}, {text:'تسدد ديون/فواتير', points:15}, {text:'مقاضي للبيت', points:10}, {text:'اشتراكات نت', points:5}] },
            { text: "أكلة سعودية مستحيل تخلو منها أي عزيمة أو مناسبة كبيرة؟", answers: [{text:'مفطح/كبسة لحم', points:60}, {text:'جريش', points:15}, {text:'قرصان', points:10}, {text:'مرقوق', points:10}, {text:'سليق', points:5}] },
            { text: "مكان يضيّع فيه الواحد مفاتيح السيارة دايم؟", answers: [{text:'في الثوب الثاني', points:35}, {text:'على الطاولة/المدخل', points:25}, {text:'في السيارة نفسها', points:20}, {text:'تحت الكنبة', points:15}, {text:'في الباب (ناسيها)', points:5}] },
            { text: "وش أكثر تطبيق نفتحه أول ما نصحى من النوم؟", answers: [{text:'واتساب', points:45}, {text:'تويتر (X)', points:25}, {text:'تيك توك', points:15}, {text:'سناب شات', points:10}, {text:'إنستقرام', points:5}] },
            { text: "شيء ننساه دايم إذا رحنا السوبر ماركت وبدون ورقة مقاضي؟", answers: [{text:'خبز/صامولي', points:30}, {text:'المنظفات', points:25}, {text:'الخضار الأساسية', points:20}, {text:'البيض', points:15}, {text:'أكياس الزبالة', points:10}] },
            { text: "هدية كلاسيكية دايم نهديها للشباب في تخرجهم أو زواجهم؟", answers: [{text:'عطر', points:40}, {text:'ساعة', points:30}, {text:'قلم ومسباح', points:15}, {text:'مبلغ مالي', points:10}, {text:'باقة ورد', points:5}] },
            { text: "جملة تنقال دايم في نهاية أي مكالمة هاتفية مع الأهل؟", answers: [{text:'مع السلامة/فمان الله', points:45}, {text:'توصي بشيء؟', points:25}, {text:'يلا مع السلامة', points:15}, {text:'دير بالك على نفسك', points:10}, {text:'أشوفك على خير', points:5}] }
        ];

        // نظام توليد الأصوات الإلكترونية (مضمون العمل على كل الأجهزة بدون روابط خارجية)
        const playSynthSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'correct') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, ctx.currentTime); // D5
                    osc.frequency.setValueAtTime(880, ctx.currentTime + 0.1); // A5
                    gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                    osc.start(); osc.stop(ctx.currentTime + 0.4);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, ctx.currentTime);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                    osc.start(); osc.stop(ctx.currentTime + 0.5);
                } else if (type === 'buzz') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(350, ctx.currentTime);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                }
            } catch(e) { console.log("Audio context block:", e); }
        };

        function App() {
            const [role, setRole] = React.useState(null);
            const [room, setRoom] = React.useState('');
            const [gameState, setGameState] = React.useState({
                activeTeam: "", buzzerOpen: true, questionIndex: 0, revealed: {},
                teams: {
                    team1: { name: 'الفريق الأول', score: 0, errors: 0 },
                    team2: { name: 'الفريق الثاني', score: 0, errors: 0 }
                }
            });

            React.useEffect(() => {
                if (!room) return;
                const roomRef = ref(db, `rooms/${room}`);
                const unsubscribe = onValue(roomRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        setGameState(prev => {
                            if (data.activeTeam && data.activeTeam !== prev.activeTeam) playSynthSound('buzz');
                            return { ...prev, ...data };
                        });
                    } else if (role === 'host') {
                        // تهيئة تلقائية للغرفة في الفايربيس لتجنب تعليق الأزرار
                        const freshState = {
                            activeTeam: "", buzzerOpen: true, questionIndex: 0, revealed: {0:false,1:false,2:false,3:false,4:false},
                            teams: {
                                team1: { name: 'الفريق الأول', score: 0, errors: 0 },
                                team2: { name: 'الفريق الثاني', score: 0, errors: 0 }
                            }
                        };
                        set(roomRef, freshState);
                    }
                });
                return () => unsubscribe();
            }, [room, role]);

            const updateDB = (updates) => update(ref(db, `rooms/${room}`), updates);

            // تحكم المقدم ----------------------
            const toggleBuzzer = () => updateDB({ buzzerOpen: !gameState.buzzerOpen });
            
            const triggerWrongAnswer = () => {
                if (gameState.activeTeam) {
                    playSynthSound('wrong');
                    const currentErrors = gameState.teams[gameState.activeTeam].errors;
                    updateDB({
                        [`teams/${gameState.activeTeam}/errors`]: Math.min(currentErrors + 1, 3),
                        activeTeam: "" // تصفير الكبس تلقائياً بعد الخطأ
                    });
                }
            };

            const handleRemoveError = (teamKey) => {
                const currentErrors = gameState.teams[teamKey].errors;
                updateDB({ [`teams/${teamKey}/errors`]: Math.max(currentErrors - 1, 0) });
            };

            const clickRevealAnswer = (idx, points) => {
                playSynthSound('correct');
                const updates = { [`revealed/${idx}`]: true };
                if (gameState.activeTeam) {
                    const currentScore = gameState.teams[gameState.activeTeam].score;
                    updates[`teams/${gameState.activeTeam}/score`] = currentScore + points;
                    updates.activeTeam = ""; 
                }
                updateDB(updates);
            };

            const nextQuestion = () => {
                updateDB({
                    questionIndex: (gameState.questionIndex + 1) % ALL_QUESTIONS.length,
                    revealed: {0:false,1:false,2:false,3:false,4:false},
                    activeTeam: "",
                    buzzerOpen: true,
                    'teams/team1/errors': 0,
                    'teams/team2/errors': 0
                });
            };

            // تحكم اللاعب ----------------------
            const pressBuzzer = () => {
                if (gameState.buzzerOpen && !gameState.activeTeam) {
                    updateDB({ activeTeam: role });
                }
            };

            const currentQuestion = ALL_QUESTIONS[gameState.questionIndex];

            // شاشة الدخول الرئيسية
            if (!role) return (
                <div class="flex flex-col items-center justify-center min-h-screen gap-6 p-4 max-w-md mx-auto">
                    <h1 class="text-6xl font-black text-amber-400 mb-4 tracking-wider">سياق</h1>
                    <input class="p-4 rounded-2xl bg-slate-900 border-2 border-slate-800 text-center text-xl w-full text-white focus:border-amber-400 outline-none" 
                           placeholder="أدخل رمز الغرفة" value={room} onChange={e => setRoom(e.target.value)} />
                    
                    <div class="grid grid-cols-1 gap-3 w-full">
                        <button disabled={!room} class="bg-amber-500 disabled:opacity-40 p-4 rounded-2xl font-bold text-slate-950 text-lg transition-all" onClick={() => setRole('host')}>مقدم اللعبة</button>
                        <button disabled={!room} class="bg-blue-600 disabled:opacity-40 p-4 rounded-2xl font-bold text-lg transition-all" onClick={() => setRole('display')}>شاشة العرض (الجمهور)</button>
                        <button disabled={!room} class="bg-emerald-600 disabled:opacity-40 p-4 rounded-2xl font-bold text-lg transition-all" onClick={() => setRole('team1')}>لاعب: الفريق الأول</button>
                        <button disabled={!room} class="bg-purple-600 disabled:opacity-40 p-4 rounded-2xl font-bold text-lg transition-all" onClick={() => setRole('team2')}>لاعب: الفريق الثاني</button>
                    </div>
                </div>
            );

            // شاشة اللاعب (الجوال)
            if (role === 'team1' || role === 'team2') {
                const myTurn = gameState.activeTeam === role;
                const allowed = gameState.buzzerOpen && !gameState.activeTeam;
                return (
                    <div class="flex flex-col items-center justify-center min-h-screen p-6 bg-slate-950">
                        <span class="text-sm text-slate-500 mb-2">غرفة: {room}</span>
                        <h2 class="text-2xl font-bold mb-12 text-center text-slate-300">{role === 'team1' ? 'الفريق الأول' : 'الفريق الثاني'}</h2>
                        <button onClick={pressBuzzer} disabled={!allowed}
                                class={`w-64 h-64 rounded-full font-black text-4xl shadow-2xl transition-all duration-150 select-none touch-manipulation
                                ${myTurn ? 'bg-emerald-500 scale-105 shadow-emerald-500/50 text-white' : 
                                  allowed ? 'bg-red-600 active:scale-95 shadow-red-600/30 text-white' : 'bg-slate-800 text-slate-600 cursor-not-allowed'}`}>
                            {myTurn ? 'كَبَسْتَ!' : allowed ? 'إكْبِسْ!' : 'مُقْفَل'}
                        </button>
                    </div>
                );
            }

            // شاشة العرض للجمهور
            if (role === 'display') return (
                <div class="p-6 md:p-12 min-h-screen flex flex-col justify-between bg-slate-950">
                    <div class="flex justify-between items-center gap-4">
                        {['team1', 'team2'].map(t => (
                            <div key={t} class={`p-4 md:p-6 rounded-2xl w-1/2 max-w-sm text-center border-4 transition-all ${gameState.activeTeam === t ? 'border-amber-400 bg-slate-900 scale-102' : 'border-slate-800 bg-slate-900/50'}`}>
                                <h2 class="text-xl md:text-2xl font-bold text-slate-300">{gameState.teams[t].name}</h2>
                                <p class="text-4xl md:text-5xl font-black text-amber-400 my-2">{gameState.teams[t].score}</p>
                                <div class="flex justify-center gap-1">
                                    {[1,2,3].map(i => (
                                        <span key={i} class={`w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center font-bold text-lg md:text-xl ${gameState.teams[t].errors >= i ? 'bg-red-600 text-white animate-ping-once' : 'bg-slate-800 text-slate-600'}`}>X</span>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>

                    <div class="my-auto text-center py-8">
                        <p class="text-sm md:text-lg text-slate-500 mb-2 font-mono uppercase tracking-widest">سألنا 100 شخص...</p>
                        <h1 class="text-3xl md:text-5xl font-black leading-snug mb-8 max-w-4xl mx-auto text-white">{currentQuestion.text}</h1>
                        <div class="grid grid-cols-1 gap-3 max-w-2xl mx-auto w-full">
                            {currentQuestion.answers.map((a, i) => (
                                <div key={i} class="bg-slate-900 border-2 border-slate-800 p-4 rounded-xl flex justify-between items-center h-16 md:h-20 text-xl md:text-2xl font-bold">
                                    {gameState.revealed[i] ? (
                                        <><span class="text-white">{a.text}</span><span class="text-emerald-400 font-mono font-black">{a.points}</span></>
                                    ) : (
                                        <div class="w-full text-center text-slate-700 font-mono">--- {i + 1} ---</div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            // شاشة المقدم (التحكم الكامل والجدولين)
            if (role === 'host') return (
                <div class="p-4 md:p-6 min-h-screen flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-center bg-slate-900 p-4 rounded-2xl mb-4 border border-slate-800">
                            <div class="font-black text-amber-400 text-lg">غرفة التحكم: <span class="font-mono text-white">{room}</span></div>
                            <button onClick={nextQuestion} class="bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-xl font-bold text-sm transition-all">السؤال التالي ➔</button>
                        </div>

                        {/* لوحة الفرق فوق الجدول للمقدم */}
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            {['team1', 'team2'].map(t => (
                                <div key={t} class={`p-4 rounded-2xl bg-slate-900 border-2 transition-all ${gameState.activeTeam === t ? 'border-amber-400 bg-slate-850' : 'border-slate-800'}`}>
                                    <div class="flex justify-between items-center flex-wrap gap-2">
                                        <h2 class="font-bold text-slate-300">{gameState.teams[t].name}</h2>
                                        <span class="bg-amber-400 text-slate-950 px-3 py-0.5 rounded-full font-black text-sm">{gameState.teams[t].score} ن</span>
                                    </div>
                                    <div class="flex items-center gap-2 mt-3">
                                        <span class="text-xs text-slate-500">الأخطاء:</span>
                                        {[1,2,3].map(i => (
                                            <span key={i} class={`w-6 h-6 rounded-md flex items-center justify-center font-bold text-xs ${gameState.teams[t].errors >= i ? 'bg-red-600' : 'bg-slate-800 text-slate-600'}`}>X</span>
                                        ))}
                                        {gameState.teams[t].errors > 0 && (
                                            <button onClick={() => handleRemoveError(t)} class="text-xs text-slate-400 underline mr-auto hover:text-white">إلغاء خطأ</button>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* نظام الجدولين للمقدم */}
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-24">
                            {/* الجدول الأول: لوحة تحكم الأجوبة */}
                            <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                                <h3 class="text-xs font-bold text-slate-400 mb-3">الجدول 1: انقر لكشف الجواب ومنح النقاط للكابس</h3>
                                {currentQuestion.answers.map((a, i) => (
                                    <button key={i} onClick={() => clickRevealAnswer(i, a.points)} disabled={gameState.revealed[i]}
                                        class={`w-full flex justify-between p-3.5 mb-2 rounded-xl font-bold transition-all text-right
                                            ${gameState.revealed[i] ? 'bg-slate-950 text-slate-600 cursor-not-allowed' : 'bg-slate-800 hover:bg-slate-750 text-white'}`}>
                                        <span>{a.text}</span>
                                        <span class="font-mono text-emerald-400">({a.points})</span>
                                    </button>
                                ))}
                            </div>

                            {/* الجدول الثاني: محاكاة شاشة العرض (مخفي) */}
                            <div class="bg-slate-900 p-4 rounded-2xl border-2 border-dashed border-slate-800 opacity-80">
                                <h3 class="text-xs font-bold text-amber-500 mb-3">الجدول 2: شكل الشاشة الحالي عند اللاعبين</h3>
                                {currentQuestion.answers.map((a, i) => (
                                    <div key={i} class="p-3.5 mb-2 rounded-xl bg-slate-950 border border-slate-900 flex justify-between font-bold text-sm">
                                        {gameState.revealed[i] ? (
                                            <><span class="text-slate-300">{a.text}</span><span class="text-emerald-500 font-mono">{a.points}</span></>
                                        ) : (
                                            <span class="text-slate-700 mx-auto font-mono">--- {i+1} ---</span>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* شريط التحكم السفلي الثابت بالمنتصف */}
                    <div class="fixed bottom-0 left-0 right-0 p-4 bg-slate-900/90 backdrop-blur-md border-t border-slate-800 flex justify-center gap-4 max-w-xl mx-auto rounded-t-3xl shadow-2xl">
                        <button onClick={toggleBuzzer} 
                            class={`px-6 py-3 rounded-xl font-bold text-sm transition-all shadow-md ${gameState.buzzerOpen ? 'bg-emerald-600 text-white' : 'bg-slate-700 text-slate-400'}`}>
                            {gameState.buzzerOpen ? '✅ الكبس مفتوح' : '❌ الكبس مقفل'}
                        </button>
                        
                        <button onClick={triggerWrongAnswer} disabled={!gameState.activeTeam}
                            class={`px-6 py-3 rounded-xl font-bold text-sm flex items-center gap-2 transition-all shadow-md
                                ${gameState.activeTeam ? 'bg-red-600 text-white hover:bg-red-700' : 'bg-slate-800 text-slate-600 cursor-not-allowed'}`}>
                            <span>تسجيل خطأ على الكابس ({gameState.activeTeam ? (gameState.activeTeam === 'team1' ? 'فريق 1' : 'فريق 2') : 'لا يوجد كبس'})</span>
                        </button>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

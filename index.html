<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سياق الروتين</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
      }
    </script>
</head>
<body class="m-0 p-0 min-h-screen select-none bg-[#0c121c] text-[#e8edf4]">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set, onValue, update } from "firebase/database";

        const firebaseConfig = {
            authDomain: "siyaq-rouyine.firebaseapp.com",
            databaseURL: "https://siyaq-rouyine-default-rtdb.firebaseio.com",
            projectId: "siyaq-rouyine",
            storageBucket: "siyaq-rouyine.appspot.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app, "https://siyaq-rouyine-default-rtdb.firebaseio.com");

        const { useState, useEffect } = React;

        const TEAM_COLORS = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b'];
        const CATEGORIES = ['عادات يومية', 'طبخ وأكلات', 'سيارات', 'سفر وسياحة', 'تقنية وجوالات', 'قهوة وشاهي'];

        const QUESTIONS = [
          // عادات يومية
          { category: 'عادات يومية', text: 'اذكر أول شيء يفعله أغلب الناس بعد الاستيقاظ من النوم مباشرة', answers: [ { text: 'النظر في الجوال وتصفح الإشعارات', points: 42 }, { text: 'الذهاب للحمام وغسل الوجه', points: 28 }, { text: 'شرب ماء أو قهوة', points: 15 }, { text: 'تعديل السرير والغطاء', points: 10 }, { text: 'إغلاق المنبه والنوم مجدداً', points: 5 } ] },
          { category: 'عادات يومية', text: 'أكثر شيء ينساه الناس عند الخروج السريع من البيت', answers: [ { text: 'مفاتيح البيت أو السيارة', points: 38 }, { text: 'جوال أو شاحن', points: 30 }, { text: 'المحفظة أو بطاقة الصراف', points: 18 }, { text: 'النظارة الشمسية', points: 9 }, { text: 'العطر', points: 5 } ] },
          { category: 'عادات يومية', text: 'مكان يقضي فيه الناس أغلب وقتهم خلال عطلة نهاية الأسبوع', answers: [ { text: 'المقاهي والكافيهات', points: 40 }, { text: 'الاستراحات أو الشاليهات', points: 25 }, { text: 'المولات والمجمعات', points: 18 }, { text: 'البيت والنوم', points: 12 }, { text: 'الحدائق والبر', points: 5 } ] },
          
          // طبخ وأكلات
          { category: 'طبخ وأكلات', text: 'أشهر طبق رئيسي تجده في أغلب الولائم والمناسبات العربية', answers: [ { text: 'الأرز واللحم (المفطح / الكبسة)', points: 55 }, { text: 'المشويات المشكلة', points: 20 }, { text: 'المقبلات والسلطات', points: 12 }, { text: 'الجريش أو القرصان', points: 8 }, { text: 'الكنافة والحلويات', points: 5 } ] },
          { category: 'طبخ وأكلات', text: 'شيء لا يخلو منه أي مطبخ عربي مهما كانت الظروف', answers: [ { text: 'البصل والثوم', points: 35 }, { text: 'الأرز (العيش)', points: 30 }, { text: 'الزيت والزبادي', points: 15 }, { text: 'البهارات المشكلة', points: 13 }, { text: 'الطماطم والصلصة', points: 7 } ] },
          
          // سيارات
          { category: 'سيارات', text: 'أكثر سبب يدفع الشخص لشراء سيارة جديدة أو استبدال سيارته الحالية', answers: [ { text: 'كثرة الأعطال والمشاكل الميكانيكية', points: 40 }, { text: 'الرغبة في موديل أحدث وشكل جديد', points: 26 }, { text: 'اتساع العائلة والحاجة لسيارة أكبر', points: 18 }, { text: 'توفر السيولة أو عروض تقسيط قوية', points: 11 }, { text: 'استهلاك الوقود العالي في القديمة', points: 5 } ] },
          { category: 'سيارات', text: 'أبرز ميزة يبحث عنها الشباب عند اختيار سيارة رياضية أو فاخرة', answers: [ { text: 'قوة المحرك والتسارع (النشاط)', points: 45 }, { text: 'شكل وتصميم السيارة الخارجي', points: 25 }, { text: 'صوت العادم والتطريب', points: 15 }, { text: 'التقنيات الداخلية والشاشات', points: 10 }, { text: 'سعر إعادة البيع والاعتمادية', points: 5 } ] },

          // سفر وسياحة
          { category: 'سفر وسياحة', text: 'أهم غرض يحرص المسافر على التأكد منه قبل التوجه للمطار', answers: [ { text: 'جواز السفر وتأشيرة الدخول', points: 50 }, { text: 'الجوال واللابتوب والشواحن', points: 22 }, { text: 'النقود وبطاقات الائتمان الدولية', points: 16 }, { text: 'تذاكر الطيران وحجز الفندق', points: 8 }, { text: 'الأدوية الشخصية المهمة', points: 4 } ] },
          
          // تقنية وجوالات
          { category: 'تقنية وجوالات', text: 'أكثر مواصفة يركز عليها المشتري عند تصفح الجوالات الجديدة', answers: [ { text: 'أداء وجودة الكاميرات والتصوير', points: 38 }, { text: 'حجم وسعة البطارية وسرعة الشحن', points: 28 }, { text: 'السعر مقابل القيمة والمواصفات', points: 18 }, { text: 'حجم ذاكرة التخزين الداخلية', points: 11 }, { text: 'نوع الشاشة وسرعة التحديث', points: 5 } ] },
          
          // قهوة وشاهي
          { category: 'قهوة وشاهي', text: 'أشهر أداة تفتير وإعداد تستخدم في محامص ومقاهي المختصة حالياً', answers: [ { text: 'أداة V60 الشهيرة', points: 50 }, { text: 'آلة الإسبريسو التجارية', points: 25 }, { text: 'أداة الكيمكس', points: 12 }, { text: 'الفرنش بريس', points: 8 }, { text: 'الآيروبريس', points: 5 } ] }
        ];

        function defaultState(roomCode) {
          return {
            roomCode, phase: 'lobby', round: 1,
            teams: [
              { id: 0, name: 'الفريق الأزرق', color: TEAM_COLORS[0], score: 0 },
              { id: 1, name: 'الفريق الأحمر', color: TEAM_COLORS[1], score: 0 }
            ],
            players: [], currentQuestion: null, usedQuestions: [],
            buzzedTeamId: null, buzzedPlayerName: '', errors: 0, roundPoints: 0,
            activeTeamTurn: null
          };
        }

        function App() {
          const [roomCode, setRoomCode] = useState('');
          const [role, setRole] = useState(null);
          const [game, setGame] = useState(null);
          const [myName, setMyName] = useState('');
          const [myTeam, setMyTeam] = useState(0);
          const [joined, setJoined] = useState(false);

          useEffect(() => {
            if (!roomCode) return;
            return onValue(ref(db, `rooms/${roomCode}`), (snap) => {
              if (snap.val()) setGame(snap.val());
            });
          }, [roomCode]);

          const initRoom = async (chosenRole) => {
            let code = roomCode.trim().toUpperCase();
            if (chosenRole === 'host' && !code) {
              code = Math.random().toString(36).slice(2, 6).toUpperCase();
              await set(ref(db, `rooms/${code}`), defaultState(code));
            }
            setRoomCode(code);
            setRole(chosenRole);
          };

          const joinAsPlayer = async () => {
            if (!myName.trim()) return;
            const refPath = ref(db, `rooms/${roomCode}/players`);
            const currentPlayers = game.players || [];
            const newPlayer = { name: myName.trim(), teamId: myTeam };
            await set(refPath, [...currentPlayers, newPlayer]);
            setJoined(true);
          };

          const selectQuestion = async (cat) => {
            const pool = QUESTIONS.filter(q => q.category === cat && !(game.usedQuestions || []).includes(q.text));
            if (!pool.length) return alert('انتهت أسئلة هذا القسم!');
            const q = pool[Math.floor(Math.random() * pool.length)];
            
            await update(ref(db, `rooms/${roomCode}`), {
              currentQuestion: { text: q.text, category: q.category, answers: q.answers.map(a => ({...a, revealed: false})) },
              usedQuestions: [...(game.usedQuestions || []), q.text],
              buzzedTeamId: null, buzzedPlayerName: '', errors: 0, roundPoints: 0, activeTeamTurn: null
            });
          };

          const triggerBuzzer = async () => {
            if (game.buzzedTeamId !== null) return; 
            const player = (game.players || []).find(p => p.name === myName);
            if (!player) return;
            await update(ref(db, `rooms/${roomCode}`), {
              buzzedTeamId: player.teamId,
              buzzedPlayerName: player.name,
              activeTeamTurn: player.teamId
            });
          };

          const revealAnswer = async (idx) => {
            const ans = game.currentQuestion.answers[idx];
            if (ans.revealed) return;
            const updatedAnswers = [...game.currentQuestion.answers];
            updatedAnswers[idx].revealed = true;
            
            await update(ref(db, `rooms/${roomCode}`), {
              'currentQuestion/answers': updatedAnswers,
              roundPoints: game.roundPoints + ans.points
            });
          };

          const addError = async () => {
            if (game.errors >= 3) return;
            await update(ref(db, `rooms/${roomCode}`), { errors: game.errors + 1 });
          };

          const clearBuzzer = async () => {
            await update(ref(db, `rooms/${roomCode}`), { buzzedTeamId: null, buzzedPlayerName: '' });
          };

          const endRoundAndAward = async (teamId) => {
            const updatedTeams = [...game.teams];
            updatedTeams[teamId].score += game.roundPoints;
            await update(ref(db, `rooms/${roomCode}`), {
               teams: updatedTeams,
               currentQuestion: null,
               roundPoints: 0,
               errors: 0,
               buzzedTeamId: null,
               buzzedPlayerName: ''
            });
          };

          if (!role) {
            return (
              <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center">
                <h1 class="text-5xl font-black mb-2 text-amber-400">سياق الروتين 🎯</h1>
                <p class="text-slate-400 mb-8">نظام الحساب التلقائي، لوحة التحكم الكاملة، وأزرار الكبس اللحظية</p>
                <div class="w-full max-w-sm space-y-3">
                  <input value={roomCode} onChange={e => setRoomCode(e.target.value)} placeholder="أدخل رمز الغرفة المتواجد" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-center text-white uppercase font-bold text-lg"/>
                  <button onClick={() => initRoom('host')} class="w-full p-4 bg-amber-500 text-slate-950 font-bold rounded-xl text-lg shadow-lg">🎙️ دخول كمقدم اللعبة (أو إنشاء)</button>
                  <button onClick={() => initRoom('display')} class="w-full p-4 bg-slate-700 font-bold rounded-xl text-lg">🖥️ شاشة العرض الكبرى للمجلس</button>
                  <button onClick={() => initRoom('player')} class="w-full p-4 bg-cyan-600 font-bold rounded-xl text-lg">📱 دخول كلاعب بكباسة الجوال</button>
                </div>
              </div>
            );
          }

          if (role === 'player' && !joined) {
            return (
              <div class="flex flex-col items-center justify-center min-h-screen p-6">
                <div class="bg-slate-800 p-6 rounded-2xl w-full max-w-md border border-slate-700">
                  <h2 class="text-2xl font-bold mb-6 text-center text-amber-400">تسجيل دخول اللاعب للغرفة ({roomCode})</h2>
                  <input value={myName} onChange={e => setMyName(e.target.value)} placeholder="اكتب اسمك الحقيقي هنا" class="w-full p-3 bg-slate-900 rounded-xl mb-4 text-center text-white text-lg font-semibold border border-slate-700"/>
                  <label class="block mb-2 text-sm text-slate-400">اختر فريقك المخصص:</label>
                  <div class="grid grid-cols-2 gap-3 mb-6">
                     <button onClick={() => setMyTeam(0)} class={`p-4 rounded-xl font-bold text-white transition-all ${myTeam === 0 ? 'bg-blue-600 ring-4 ring-blue-300' : 'bg-slate-700'}`}>الفريق الأزرق</button>
                     <button onClick={() => setMyTeam(1)} class={`p-4 rounded-xl font-bold text-white transition-all ${myTeam === 1 ? 'bg-red-600 ring-4 ring-red-300' : 'bg-slate-700'}`}>الفريق الأحمر</button>
                  </div>
                  <button onClick={joinAsPlayer} class="w-full p-4 bg-emerald-500 text-slate-950 font-black rounded-xl text-lg shadow-xl">تأكيد ودخول المنصة</button>
                </div>
              </div>
            );
          }

          if (role === 'player' && joined) {
            const myTeamData = game?.teams?.[myTeam];
            const isBuzzedMe = game?.buzzedPlayerName === myName;
            return (
              <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center" style={{ backgroundColor: isBuzzedMe ? myTeamData?.color : '#0c121c' }}>
                <div class="mb-4 text-lg">مرحبًا <span class="font-bold text-amber-400">{myName}</span> ({myTeamData?.name})</div>
                
                {game?.currentQuestion ? (
                  <div class="w-full max-w-sm">
                    <div class="bg-slate-800 p-4 rounded-xl mb-6 border border-slate-700">
                      <p class="text-sm text-slate-400">السؤال النشط الآن</p>
                      <p class="font-bold text-lg">{game.currentQuestion.text}</p>
                    </div>
                    
                    <button onClick={triggerBuzzer} disabled={game.buzzedTeamId !== null} class={`w-64 h-64 rounded-full font-black text-2xl shadow-2xl border-8 transition-all uppercase flex items-center justify-center mx-auto ${game.buzzedTeamId !== null ? 'bg-slate-700 border-slate-600 text-slate-400 scale-95' : 'bg-red-600 border-red-500 hover:bg-red-500 active:scale-90 text-white'}`}>
                      {game.buzzedTeamId !== null ? `مكبوس لـ:\n${game.buzzedPlayerName}` : 'اكبببببس! 🚨'}
                    </button>
                  </div>
                ) : (
                  <div class="text-slate-400 text-lg animate-pulse">بانتظار أن يختار المقدم السؤال القادم...☕</div>
                )}
              </div>
            );
          }

          return (
            <div class="p-4 max-w-6xl mx-auto">
              {/* الرأس العام */}
              <div class="bg-slate-800 p-4 rounded-xl flex justify-between items-center mb-6 border border-slate-700">
                 <div class="text-lg">الغرفة: <span class="font-mono font-bold text-amber-400 text-xl">{roomCode}</span></div>
                 <div class="flex gap-8 font-bold text-lg">
                    <span class="text-blue-400">🔵 {game?.teams?.[0]?.name}: {game?.teams?.[0]?.score} نقطة</span>
                    <span class="text-red-400">🔴 {game?.teams?.[1]?.name}: {game?.teams?.[1]?.score} نقطة</span>
                 </div>
                 <div class="p-1 px-4 bg-slate-900 rounded text-sm text-cyan-400 font-bold">{role === 'host' ? '🎙️ لوحة التحكم للمقدم الحصرية' : '🖥️ شاشة المجلس العريضة'}</div>
              </div>

              {game?.phase === 'lobby' ? (
                 <div class="bg-slate-800 p-8 rounded-2xl text-center border border-slate-700">
                    <h2 class="text-3xl font-black mb-4">قاعة انتظار مجلس المتسابقين</h2>
                    <p class="mb-6 text-slate-400">عدد اللاعبين المستعدين في الداخل حالياً: <span class="text-white font-bold">{game?.players?.length || 0}</span></p>
                    {role === 'host' && (
                       <button onClick={() => set(ref(db, `rooms/${roomCode}/phase`), 'playing')} class="p-4 bg-emerald-500 text-slate-950 font-black rounded-xl text-xl px-8 shadow-xl hover:bg-emerald-400">إغلاق المجلس وبدء التنافس واللعب فورا 🚀</button>
                    )}
                 </div>
              ) : (
                 <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    {/* عمود اللعبة الرئيسي (الشاشة والمقدم يتشاركون فيه) */}
                    <div class="lg:col-span-2 space-y-6">
                       <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 relative overflow-hidden">
                          {game?.currentQuestion ? (
                             <div class="text-center">
                                <span class="bg-amber-400/20 text-amber-300 text-sm font-bold px-4 py-1 rounded-full">{game.currentQuestion.category}</span>
                                <h2 class="text-2xl md:text-3xl font-black my-6 leading-relaxed">{game.currentQuestion.text}</h2>
                                
                                {/* مجمع النقاط الحالي للجولة */}
                                <div class="bg-slate-900/60 inline-block p-4 px-8 rounded-2xl border border-slate-700 mb-6">
                                   <div class="text-xs text-slate-400">مجموع نقاط الإجابات المكتشفة بالجولة</div>
                                   <div class="text-4xl font-mono font-black text-amber-400">+{game.roundPoints || 0}</div>
                                </div>

                                {/* لوحة الأخطاء الثلاثة المدمجة بالصوت والضوء */}
                                <div class="flex justify-center gap-4 mb-6">
                                   {[1, 2, 3].map((num) => (
                                      <div key={num} class={`w-12 h-12 rounded-xl flex items-center justify-center font-black text-2xl border-2 transition-all ${game.errors >= num ? 'bg-red-600/30 border-red-500 text-red-500 scale-110 shadow-lg shadow-red-600/20' : 'bg-slate-900/40 border-slate-700 text-slate-600'}`}>❌</div>
                                   ))}
                                </div>

                                {/* الإجابات */}
                                <div class="space-y-2 max-w-xl mx-auto text-right">
                                   {game.currentQuestion.answers.map((ans, idx) => (
                                      <div key={idx} onClick={() => role === 'host' && revealAnswer(idx)} class={`p-4 rounded-xl border flex justify-between items-center transition-all ${ans.revealed ? 'bg-blue-950/60 border-blue-500 text-white font-bold' : role === 'host' ? 'bg-slate-900/60 border-slate-700 text-slate-400 hover:border-slate-500' : 'bg-slate-900/40 border-slate-800 text-transparent select-none'}`}>
                                         <div class="flex items-center gap-3">
                                            <span class="w-7 h-7 bg-slate-800 rounded-full flex items-center justify-center text-xs text-slate-400 font-mono">{idx + 1}</span>
                                            <span class={ans.revealed || role === 'host' ? 'text-white' : 'hidden'}>{ans.text}</span>
                                         </div>
                                         <span class={`font-mono font-bold text-amber-400 ${ans.revealed || role === 'host' ? 'visible' : 'hidden'}`}>+{ans.points}</span>
                                      </div>
                                   ))}
                                </div>
                             </div>
                          ) : (
                             <div class="text-center py-12 text-slate-400 text-xl font-medium">بانتظار اختيار موضوع الجولة من قبل مقدم اللعبة...🎙️</div>
                          )}
                       </div>
                    </div>

                    {/* عمود لوحة التحكم الخاصة بالمقدم الحصرية أو معلومات الحالة للشاشة الكبيرة */}
                    <div class="space-y-6">
                       {/* لوحة حالة الكبس اللحظية لسرعة الرد */}
                       <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 text-center">
                          <h3 class="font-bold text-slate-400 mb-3 text-sm">حالة كبس الأزرار اللحظية (Buzzer)</h3>
                          {game?.buzzedTeamId !== null ? (
                             <div class="p-4 rounded-xl animate-bounce text-white font-black text-lg" style={{ backgroundColor: game?.teams?.[game.buzzedTeamId]?.color }}>
                                🚨 أسرع كبسة: {game?.buzzedPlayerName}
                                <div class="text-xs font-normal mt-1 text-white/90">الدور أو فرصة السرقة لديهم الآن</div>
                             </div>
                          ) : (
                             <div class="p-4 bg-slate-900 rounded-xl text-slate-400 border border-slate-800 text-sm">💡 جميع كبّاسات المتسابقين جاهزة ومنتظرة الإطلاق</div>
                          )}
                          
                          {role === 'host' && game?.buzzedTeamId !== null && (
                             <button onClick={clearBuzzer} class="mt-4 w-full p-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-xs font-bold transition-all text-white">🔄 إعادة تفعيل كباسة اللاعبين وتصفير الدور</button>
                          )}
                       </div>

                       {/* لوحة تحكم المقدم الشاملة لإدارة مجريات وسير اللعب والتنقيط التلقائي */}
                       {role === 'host' && (
                          <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 space-y-4">
                             <h3 class="font-black text-amber-400 border-b border-slate-700 pb-2 text-sm">🕹️ لوحة إدارة عمليات التنقيط والتحكم</h3>
                             
                             {!game?.currentQuestion ? (
                                <div class="space-y-2">
                                   <p class="text-xs text-slate-400 font-medium">اختر موضوع الجولة الحالية لإطلاقه للمجلس:</p>
                                   <div class="grid grid-cols-2 gap-2">
                                      {CATEGORIES.map(cat => (
                                         <button key={cat} onClick={() => selectQuestion(cat)} class="p-3 bg-slate-900 border border-slate-700 rounded-xl hover:bg-slate-700 transition-colors font-bold text-xs text-center">{cat}</button>
                                      ))}
                                   </div>
                                </div>
                             ) : (
                                <div class="space-y-3">
                                   <button onClick={addError} class="w-full p-3 bg-red-600/30 hover:bg-red-600/50 border border-red-500 text-red-400 font-bold rounded-xl text-sm transition-all flex items-center justify-center gap-2">❌ احتساب خطأ بالجولة (+1)</button>
                                   
                                   <div class="border-t border-slate-700 my-4 pt-3 space-y-2">
                                      <p class="text-xs text-slate-400">إنهاء الجولة وصرف النقاط المتراكمة تلقائياً للفريق الفائز:</p>
                                      <button onClick={() => endRoundAndAward(0)} class="w-full p-3 bg-blue-600 text-white font-bold rounded-xl text-xs shadow hover:bg-blue-500 transition-all">🔵 صرف النقاط المتراكمة للفريق الأزرق</button>
                                      <button onClick={() => endRoundAndAward(1)} class="w-full p-3 bg-red-600 text-white font-bold rounded-xl text-xs shadow hover:bg-red-500 transition-all">🔴 صرف النقاط المتراكمة للفريق الأحمر</button>
                                   </div>
                                   
                                   <button onClick={async () => await update(ref(db, `rooms/${roomCode}`), { currentQuestion: null, roundPoints: 0, errors: 0 })} class="w-full p-2 bg-slate-900 hover:bg-slate-700 text-slate-400 border border-slate-800 rounded-xl text-xs transition-all">⚠️ إلغاء أو تخطي هذا السؤال بالكامل دون نقاط</button>
                                </div>
                             )}
                          </div>
                       )}
                    </div>
                 </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
